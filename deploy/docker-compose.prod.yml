services:
  breadbox:
    image: ghcr.io/canalesb93/breadbox:latest
    restart: unless-stopped
    env_file: .env
    environment:
      # Where the auto-managed encryption key lives. Mounted from the
      # breadbox_data named volume below so the key survives container
      # rebuilds and upgrades.
      BREADBOX_DATA_DIR: /data
    command: ["sh", "-c", "/app/breadbox migrate && /app/breadbox serve"]
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - breadbox_data:/data
    # Uncomment to enable one-click updates from the admin dashboard.
    # This gives the container access to the Docker daemon.
    #   - /var/run/docker.sock:/var/run/docker.sock
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    expose:
      - "5432"
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # Caddy is gated behind the `caddy` compose profile. It is only started when
  # a public domain is configured. Localhost-only installs do not start Caddy,
  # so ports 80/443 are not bound on the host.
  #
  # Enable with: docker compose --profile caddy up -d
  # (install.sh toggles this automatically when DOMAIN is set.)
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["caddy"]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    env_file: .env
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  # breadbox_data holds per-install state managed by the breadbox container.
  # Currently: the auto-generated encryption.key. Backups created via the
  # admin Backups page bundle this key into the .tar.gz so a single archive
  # can fully restore the install.
  breadbox_data:
  caddy_data:
  caddy_config:
