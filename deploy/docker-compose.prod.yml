services:
  breadbox:
    image: ghcr.io/canalesb93/breadbox:latest
    restart: unless-stopped
    env_file: .env
    command: ["sh", "-c", "/app/breadbox migrate && /app/breadbox serve"]
    ports:
      # Both sides of the mapping come from .env's SERVER_PORT so the host
      # publishes the same port the binary listens on. The :-8080 default
      # keeps existing installs working when SERVER_PORT is unset.
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Agent NDJSON transcripts are written to /app/transcripts inside
      # the container (see app_config key agent.transcript_dir, default
      # "transcripts/agents"). Without this named volume, every
      # `docker compose up -d` recreates the container and silently
      # wipes the transcript history — the admin "open transcript" link
      # then 404s for every prior run. Keep this mount even if you
      # don't use the agents feature; the directory is empty until an
      # agent runs.
      - breadbox_transcripts:/app/transcripts
      # Scheduled pg_dump backups are written to /var/lib/breadbox/backups
      # when ENVIRONMENT=docker (see internal/cli/serve.go). Without this
      # named volume, files live in the container's writable layer and
      # every `docker compose up -d` wipes them — Settings → Backups
      # then shows an empty list after every redeploy. Keep this mount
      # even if you haven't enabled a schedule yet; the directory is
      # empty until a backup runs.
      - breadbox_backups:/var/lib/breadbox/backups
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${SERVER_PORT:-8080}/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    expose:
      - "5432"
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # Caddy is gated behind the `caddy` compose profile. It is only started when
  # a public domain is configured. Localhost-only installs do not start Caddy,
  # so ports 80/443 are not bound on the host.
  #
  # Enable with: docker compose --profile caddy up -d
  # (install.sh toggles this automatically when DOMAIN is set.)
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["caddy"]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    env_file: .env
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  breadbox_transcripts:
  breadbox_backups:
  caddy_data:
  caddy_config:
