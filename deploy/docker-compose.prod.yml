services:
  breadbox:
    image: ghcr.io/canalesb93/breadbox:latest
    restart: unless-stopped
    env_file: .env
    command: ["sh", "-c", "/app/breadbox migrate && /app/breadbox serve"]
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    # Uncomment to enable one-click updates from the admin dashboard.
    # This gives the container access to the Docker daemon.
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    expose:
      - "5432"
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    env_file: .env
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
