services:
  breadbox:
    # Image tags (see deploy/README.md → "Image tags"):
    #   :latest   newest stable release (recommended default — what this file
    #             ships with; managed platforms like Railway/Render pull it).
    #   :vX.Y.Z   a specific, immutable release — pin this for full control
    #             (install.sh rewrites the line below to the release it found).
    #   :edge     rolling tip of main, rebuilt every merge — bleeding edge,
    #             for testing upstream before it's released.
    image: ghcr.io/canalesb93/breadbox:latest
    restart: unless-stopped
    env_file: .env
    command: ["sh", "-c", "/app/breadbox migrate && /app/breadbox serve"]
    ports:
      # Both sides of the mapping come from .env's SERVER_PORT so the host
      # publishes the same port the binary listens on. The :-8080 default
      # keeps existing installs working when SERVER_PORT is unset.
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Persistent runtime data root. In ENVIRONMENT=docker the binary
      # defaults BB_DATA_DIR to /var/lib/breadbox; agent NDJSON
      # transcripts land at /var/lib/breadbox/transcripts/agents and
      # scheduled pg_dump backups at /var/lib/breadbox/backups. One
      # named volume covers both. Without it, every `docker compose
      # up -d` recreates the container and silently wipes transcript
      # history (admin "open transcript" → 404 for prior runs) and
      # the backups list (Settings → Backups → empty after redeploy).
      # Keep this mount even if you use neither feature — the
      # directories are created on demand.
      - breadbox_data:/var/lib/breadbox
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${SERVER_PORT:-8080}/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    expose:
      - "5432"
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # Caddy is gated behind the `caddy` compose profile. It is only started when
  # a public domain is configured. Localhost-only installs do not start Caddy,
  # so ports 80/443 are not bound on the host.
  #
  # Enable with: docker compose --profile caddy up -d
  # (install.sh toggles this automatically when DOMAIN is set.)
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["caddy"]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    env_file: .env
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  breadbox_data:
  caddy_data:
  caddy_config:
