site_name: Breadbox
site_description: Self-hosted financial data aggregation for households
site_url: https://canalesb93.github.io/breadbox
repo_url: https://github.com/canalesb93/breadbox
repo_name: canalesb93/breadbox

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Architecture: architecture.md
      - Data Model: data-model.md
  - User Guide:
      - Admin Dashboard: admin-dashboard.md
      - CSV Import: csv-import.md
      - Backup & Restore: backup.md
  - API Reference:
      - Quick Reference: api-reference.md
      - REST API (detailed): rest-api.md
      - MCP Server: mcp-server.md
      - MCP Tools: mcp-tools-reference.md
  - Provider Setup:
      - Plaid: plaid-integration.md
      - Teller: teller-integration.md
  - Contributing:
      - Design System: design-system.md
