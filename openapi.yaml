openapi: 3.1.0
info:
  title: Breadbox REST API
  version: "1.0.0"
  summary: Self-hosted financial-data REST API for households and AI agents.
  description: |
    Machine-readable contract for the Breadbox REST API. Every `/api/v1/*` endpoint
    declared on the production chi router is represented here. The companion prose
    document at `docs/api-reference.md` may lag this spec; when in doubt, this file
    is canonical.

    ## Authentication

    All `/api/v1/*` endpoints require an API key passed via the `X-API-Key` header.
    Keys carry one of two scopes:

    - `read_only` — may call any read endpoint (`GET`).
    - `full_access` — may call read endpoints **and** all write endpoints
      (`POST`, `PATCH`, `PUT`, `DELETE`, plus a handful of `GET`s like `/api-keys`
      and `/users/{user_id}/login` that return sensitive data).

    Endpoints requiring `full_access` are flagged with the phrase **Requires
    `full_access` scope.** in their description. OpenAPI does not natively
    distinguish scopes on a single API-key scheme, so the enforcement boundary is
    documented per-operation rather than encoded in the security block.

    ## Amount convention

    Transaction amounts use `NUMERIC(12,2)` and are paired with `iso_currency_code`.
    Positive = money out (debits, purchases, fees). Negative = money in (credits,
    deposits, refunds). Never sum across `iso_currency_code`.

    ## Identifiers

    Every entity has both a UUID `id` and an 8-character base62 `short_id`. REST
    responses include both. Path parameters that accept `{id}` accept either form;
    short IDs are usually preferable for humans.

    ## Pagination

    Cursor pagination is used on transaction-shaped lists. Pass the previous
    response's `next_cursor` as `?cursor=` to fetch the next page. Bounded
    resources (accounts, users, connections, categories) return bare arrays.

    ## Errors

    All error responses share the envelope `{ "error": { "code": "...",
    "message": "..." } }`. Codes are stable contracts in `UPPER_SNAKE_CASE`.
  contact:
    name: Breadbox
    url: https://breadbox.sh
  license:
    name: AGPL-3.0-only
    url: https://www.gnu.org/licenses/agpl-3.0.html

servers:
  - url: https://breadbox.example.com
    description: Self-hosted Breadbox instance (replace host with your deployment).

security:
  - apiKeyAuth: []

tags:
  - name: Health
    description: Liveness and readiness probes. No authentication.
  - name: Version
    description: Server version metadata.
  - name: Accounts
  - name: Transactions
  - name: Comments
  - name: Annotations
  - name: Tags
  - name: Categories
  - name: Connections
  - name: Sync
  - name: Rules
  - name: Account Links
  - name: Reports
  - name: Users
  - name: API Keys
  - name: Settings

paths:
  # -- Health & version (no auth) --
  /health:
    get:
      tags: [Health]
      summary: Liveness probe
      description: Returns HTTP 200 with no dependency checks. Suitable for load-balancer health checks.
      security: []
      responses:
        "200":
          description: Server is up.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }
  /health/live:
    get:
      tags: [Health]
      summary: Liveness probe (alias)
      description: Identical to `/health`.
      security: []
      responses:
        "200":
          description: Server is up.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }
  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe
      description: Verifies database connectivity and that the scheduler is running.
      security: []
      responses:
        "200":
          description: Server is ready to take traffic.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }
        "503":
          description: A dependency is unavailable.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/v1/version:
    get:
      tags: [Version]
      summary: Get server version
      description: Returns the running server version plus update-availability metadata. No authentication.
      security: []
      responses:
        "200":
          description: Version information.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VersionResponse" }

  /api/v1/auth/device-code:
    post:
      tags: [Auth]
      summary: Initiate the device-code flow
      description: |
        Mint a pending device-code pair. Unauthenticated — the device_code
        returned in the body is itself the credential the CLI uses to poll.
        The user_code is the human-facing 8-char approval code (formatted
        XXXX-XXXX) the operator enters on the verification page.
      security: []
      responses:
        "201":
          description: Pending device-code created.
          content:
            application/json:
              schema:
                type: object
                required: [device_code, user_code, verification_url, expires_in, interval]
                properties:
                  device_code: { type: string, description: Opaque polling credential carried by the CLI }
                  user_code: { type: string, description: 8-char human-facing code formatted XXXX-XXXX }
                  verification_url: { type: string, description: URL the operator opens to approve }
                  expires_in: { type: integer, description: TTL in seconds (10 minutes by default) }
                  interval: { type: integer, description: Suggested polling cadence in seconds }

  /api/v1/auth/device-code/poll:
    post:
      tags: [Auth]
      summary: Poll the status of a pending device code
      description: |
        Unauthenticated; the device_code is the credential. Returns one of:
        - `200 {status: "authorization_pending"}` — keep polling
        - `200 {status: "approved", token: "bb_..."}` — token returned exactly once
        - `400 {error: {code: "EXPIRED"}}` — past the TTL
        - `400 {error: {code: "DENIED"}}` — operator refused
        - `404 {error: {code: "INVALID_DEVICE_CODE"}}` — unknown code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_code]
              properties:
                device_code: { type: string }
      responses:
        "200":
          description: Polling outcome.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [authorization_pending, approved] }
                  token: { type: string, description: Plaintext API key — returned exactly once on the first approved poll }
        "400":
          description: Terminal failure (EXPIRED or DENIED).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "404":
          description: Unknown device_code.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/v1/headless/bootstrap:
    get:
      tags: [Health]
      summary: Setup readiness report
      description: |
        Returns a one-shot readiness/setup summary intended for the
        `breadbox doctor` CLI command. Any API key (read or write) works.
        Fields are best-effort — a per-row failure stays zero and the report
        still ships. The endpoint returns 503 only when the database is
        plainly unreachable.
      responses:
        "200":
          description: Bootstrap report.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HeadlessBootstrapResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503":
          description: Database is not reachable; partial report in body.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/v1/keys/me:
    get:
      tags: [API Keys]
      summary: Identify the calling API key (whoami)
      description: |
        Returns the API key record corresponding to the presented
        credential — name, prefix, scope, actor type/name. The full
        secret is never re-exposed. Used by `breadbox auth whoami` so
        agents and humans can confirm which identity the CLI is acting
        under. Any scope; the data only describes the caller's own key.
      responses:
        "200":
          description: Identity record for the calling key.
          content:
            application/json:
              schema:
                type: object
                required: [id, name, key_prefix, scope, actor_type, created_at]
                properties:
                  id: { type: string, format: uuid }
                  name: { type: string }
                  key_prefix: { type: string }
                  scope: { type: string, enum: [read_only, full_access] }
                  actor_type: { type: string, enum: [user, agent, system] }
                  actor_name: { type: string, nullable: true }
                  created_at: { type: string, format: date-time }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # -- Accounts --
  /api/v1/accounts:
    get:
      tags: [Accounts]
      summary: List accounts
      description: Returns every account visible to the API key. Bounded resource — no pagination.
      parameters:
        - $ref: "#/components/parameters/Fields"
      responses:
        "200":
          description: Array of accounts.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Account" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }
  /api/v1/accounts/{id}:
    parameters:
      - $ref: "#/components/parameters/IDPath"
    get:
      tags: [Accounts]
      summary: Get account
      parameters:
        - $ref: "#/components/parameters/Fields"
      responses:
        "200":
          description: Single account.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Account" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      tags: [Accounts]
      summary: Update account
      description: |
        Partially update mutable fields on a single account. Omit a key to leave
        the column unchanged. Send an explicit empty string to clear `display_name`.

        **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AccountUpdate" }
      responses:
        "200":
          description: Updated account.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Account" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/accounts/{id}/detail:
    parameters:
      - $ref: "#/components/parameters/IDPath"
    get:
      tags: [Accounts]
      summary: Get account detail
      description: Returns the standard account fields plus per-currency balances and the most recent 25 transactions.
      responses:
        "200":
          description: Account detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccountDetail" }
        "404": { $ref: "#/components/responses/NotFound" }

  # -- Transactions --
  /api/v1/transactions:
    get:
      tags: [Transactions]
      summary: List transactions
      description: Filterable, cursor-paginated transaction query.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Fields"
        - { name: account_id, in: query, schema: { type: string }, description: Filter by account UUID or short_id (repeatable). }
        - { name: connection_id, in: query, schema: { type: string }, description: Filter by connection. }
        - { name: user_id, in: query, schema: { type: string }, description: Filter by attributed user (uses `COALESCE(attributed_user_id, connection.user_id)`). }
        - { name: category_id, in: query, schema: { type: string }, description: Filter by category. }
        - { name: tag, in: query, schema: { type: string }, description: Filter by tag slug. }
        - { name: search, in: query, schema: { type: string }, description: Substring/word/fuzzy search on name + merchant_name. Comma-separated values are OR'd. }
        - { name: search_mode, in: query, schema: { type: string, enum: [contains, words, fuzzy] }, description: Search algorithm. }
        - { name: exclude_search, in: query, schema: { type: string }, description: Negative search filter (NOT ILIKE). Min 2 chars. }
        - { name: date_from, in: query, schema: { type: string, format: date } }
        - { name: date_to, in: query, schema: { type: string, format: date } }
        - { name: amount_min, in: query, schema: { type: number } }
        - { name: amount_max, in: query, schema: { type: number } }
        - { name: pending, in: query, schema: { type: boolean } }
        - { name: deleted, in: query, schema: { type: string, enum: [include, only] }, description: Whether to include or restrict to soft-deleted transactions. }
        - { name: category_override, in: query, schema: { type: boolean }, description: Filter by manual override flag. }
      responses:
        "200":
          description: Paginated transaction list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TransactionListResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /api/v1/transactions/count:
    get:
      tags: [Transactions]
      summary: Count transactions
      description: Returns the count of transactions matching the same filter set as `GET /transactions`.
      responses:
        "200":
          description: Count.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer, format: int64 }
                  iso_currency_code: { type: string, nullable: true }
  /api/v1/transactions/summary:
    get:
      tags: [Transactions]
      summary: Transaction summary
      description: Aggregate totals (income, spending, net) grouped by currency.
      responses:
        "200":
          description: Summary.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/transactions/merchants:
    get:
      tags: [Transactions]
      summary: Merchant summary
      description: Top merchants by spending, with counts and totals per currency.
      responses:
        "200":
          description: Merchant summary.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/transactions/{id}:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    get:
      tags: [Transactions]
      summary: Get transaction
      parameters: [{ $ref: "#/components/parameters/Fields" }]
      responses:
        "200":
          description: Transaction.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Transaction" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Transactions]
      summary: Delete transaction
      description: Soft-deletes the transaction (sets `deleted_at`). **Requires `full_access` scope.**
      responses:
        "204": { description: Deleted. }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/transactions/{id}/restore:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    post:
      tags: [Transactions]
      summary: Restore deleted transaction
      description: Clears `deleted_at`. **Requires `full_access` scope.**
      responses:
        "200":
          description: Restored transaction.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Transaction" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/transactions/{id}/category:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    patch:
      tags: [Transactions]
      summary: Set transaction category
      description: Sets `category_id` and `category_override = true`. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category_id]
              properties:
                category_id: { type: string, description: Category UUID or short_id. }
      responses:
        "200":
          description: Updated transaction.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Transaction" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Transactions]
      summary: Reset transaction category
      description: Clears the manual override and re-runs rule attribution. **Requires `full_access` scope.**
      responses:
        "200":
          description: Updated transaction.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Transaction" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/transactions/batch-categorize:
    post:
      tags: [Transactions]
      summary: Batch categorize transactions
      description: Apply a category to many transactions in one call. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transaction_ids, category_id]
              properties:
                transaction_ids:
                  type: array
                  items: { type: string }
                category_id: { type: string }
      responses:
        "200":
          description: Updated count.
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated: { type: integer }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/transactions/bulk-recategorize:
    post:
      tags: [Transactions]
      summary: Bulk recategorize transactions
      description: |
        Re-run categorization across a filtered set of transactions. Useful after
        rule changes. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Recategorization summary.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/transactions/update:
    post:
      tags: [Transactions]
      summary: Update transactions in bulk
      description: |
        Apply a patch (category, tags, attribution, etc.) to a filtered or
        explicit set of transactions. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Update result.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/transactions/{id}/annotations:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    get:
      tags: [Annotations]
      summary: List annotations on a transaction
      description: Annotations are append-only structured notes left by users or agents.
      responses:
        "200":
          description: Annotations.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Annotation" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/transactions/{id}/tags:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    post:
      tags: [Tags]
      summary: Add a tag to a transaction
      description: "**Requires `full_access` scope.**"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug: { type: string }
      responses:
        "200":
          description: Updated transaction tag membership.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/transactions/{id}/tags/{slug}:
    parameters:
      - $ref: "#/components/parameters/IDPath"
      - { name: slug, in: path, required: true, schema: { type: string } }
    delete:
      tags: [Tags]
      summary: Remove a tag from a transaction
      description: "**Requires `full_access` scope.**"
      responses:
        "204": { description: Removed. }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/transactions/{transaction_id}/comments:
    parameters:
      - { name: transaction_id, in: path, required: true, schema: { type: string } }
    get:
      tags: [Comments]
      summary: List comments on a transaction
      responses:
        "200":
          description: Comments.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Comment" }
    post:
      tags: [Comments]
      summary: Create comment
      description: "**Requires `full_access` scope.**"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string }
      responses:
        "201":
          description: Created comment.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Comment" }
  /api/v1/transactions/{transaction_id}/comments/{id}:
    parameters:
      - { name: transaction_id, in: path, required: true, schema: { type: string } }
      - $ref: "#/components/parameters/IDPath"
    put:
      tags: [Comments]
      summary: Update comment
      description: "**Requires `full_access` scope.**"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string }
      responses:
        "200":
          description: Updated comment.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Comment" }
    delete:
      tags: [Comments]
      summary: Delete comment
      description: "**Requires `full_access` scope.**"
      responses:
        "204": { description: Deleted. }

  # -- Categories --
  /api/v1/categories:
    get:
      tags: [Categories]
      summary: List categories
      description: Returns the household's categories (2-level hierarchy). Bounded resource.
      responses:
        "200":
          description: Categories.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Category" }
    post:
      tags: [Categories]
      summary: Create category
      description: "**Requires `full_access` scope.**"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryCreate" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Category" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /api/v1/categories/export:
    get:
      tags: [Categories]
      summary: Export categories as TSV
      description: Returns the full category table as `text/tab-separated-values` for backup or migration.
      responses:
        "200":
          description: TSV body.
          content:
            text/tab-separated-values:
              schema: { type: string }
  /api/v1/categories/import:
    post:
      tags: [Categories]
      summary: Import categories from TSV
      description: Bulk-create or upsert categories from a TSV body. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          text/tab-separated-values:
            schema: { type: string }
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Import summary.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/categories/{id}:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    get:
      tags: [Categories]
      summary: Get category
      responses:
        "200":
          description: Category.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Category" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Categories]
      summary: Update category
      description: "**Requires `full_access` scope.**"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryUpdate" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Category" }
    delete:
      tags: [Categories]
      summary: Delete category
      description: "**Requires `full_access` scope.**"
      responses:
        "204": { description: Deleted. }
  /api/v1/categories/{id}/merge:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    post:
      tags: [Categories]
      summary: Merge another category into this one
      description: |
        Reassigns transactions, rules, and child categories from `from_category_id`
        into the path category, then deletes the source. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from_category_id]
              properties:
                from_category_id: { type: string }
      responses:
        "200":
          description: Merge summary.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # -- Connections --
  /api/v1/connections:
    get:
      tags: [Connections]
      summary: List connections
      responses:
        "200":
          description: Connections.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Connection" }
    post:
      tags: [Connections]
      summary: Create a connection
      description: |
        Generic, provider-discriminated create. Supersedes
        `POST /connections/plaid/exchange`, `POST /connections/teller`, and
        `POST /connections/csv/import`.

        The `credentials` shape depends on `provider`:

        - **plaid** — `{public_token, institution_id, institution_name, accounts?}`
        - **teller** — `{access_token, enrollment_id, institution_id?, institution_name, accounts?}`
        - **csv** — `{csv_base64, column_mapping, account_name?, date_format?, ...}`
          (also accepts `multipart/form-data` with a `file` field plus the
          same configuration fields as form values).

        Returns the same `{connection_id, institution_name, status}` envelope
        all three legacy routes produce. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider]
              properties:
                provider: { type: string, enum: [plaid, teller, csv] }
                user_id: { type: string, description: "UUID or short_id" }
                credentials:
                  type: object
                  additionalProperties: true
          multipart/form-data:
            schema:
              type: object
              required: [provider, file]
              properties:
                provider: { type: string, enum: [csv] }
                user_id: { type: string }
                file: { type: string, format: binary }
                column_mapping: { type: string, description: "JSON object {column_name: column_index}" }
                date_format: { type: string }
                positive_is_debit: { type: string }
                has_debit_credit: { type: string }
                account_name: { type: string }
                connection_id: { type: string }
      responses:
        "201":
          description: Created connection.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Connection" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502":
          description: Provider exchange failed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/v1/connections/{id}:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    get:
      tags: [Connections]
      summary: Get connection
      responses:
        "200":
          description: Connection.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Connection" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Connections]
      summary: Disconnect (soft-delete) a connection
      description: Sets `status='disconnected'`. Accounts/transactions are preserved with `connection_id` set to NULL. **Requires `full_access` scope.**
      responses:
        "204": { description: Disconnected. }
  /api/v1/connections/{id}/status:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    get:
      tags: [Connections]
      summary: Get connection status
      responses:
        "200":
          description: Status info.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/connections/{id}/sync:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    post:
      tags: [Connections, Sync]
      summary: Trigger sync on a connection
      description: Enqueues a manual sync. **Requires `full_access` scope.**
      responses:
        "202":
          description: Sync started.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/connections/{id}/paused:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    post:
      tags: [Connections]
      summary: Pause or resume a connection
      description: Toggles automated sync. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paused]
              properties:
                paused: { type: boolean }
      responses:
        "200":
          description: Updated connection.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Connection" }
  /api/v1/connections/{id}/sync-interval:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    post:
      tags: [Connections]
      summary: Update connection sync interval
      description: "**Requires `full_access` scope.**"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [interval_seconds]
              properties:
                interval_seconds: { type: integer }
      responses:
        "200":
          description: Updated connection.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Connection" }
  /api/v1/connections/{id}/reauth:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    post:
      tags: [Connections]
      summary: Begin reauth flow
      description: |
        Provider-specific reauth handshake. For Plaid this returns a `link_token`
        in update mode. **Requires `full_access` scope.**
      responses:
        "200":
          description: Reauth payload.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/connections/{id}/reauth-complete:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    post:
      tags: [Connections]
      summary: Complete reauth flow
      description: Confirms reauth and flips `status='active'`. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated connection.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Connection" }
  /api/v1/connections/link:
    post:
      tags: [Connections]
      summary: Mint a hosted-link session
      description: |
        Creates a hosted-link session and returns the URL an end-user should
        open in their browser to add a new bank connection. The response
        carries a one-time-only bearer `token` and a fully-qualified `url`
        (scheme + host + `/link/<token>`). The token is **never** echoed back
        by `GET /connections/link/{id}` — capture it from this response and
        keep the URL alongside it.

        - `provider` is optional. Empty means the hosted page presents a picker.
        - `expires_in_seconds` is clamped to [0, 3600]. `0` (or missing)
          selects the default of 900s (15 minutes).
        - Action is always `link` on this endpoint. Relink (re-authenticating
          an existing connection) is exposed separately via
          `POST /connections/{id}/relink`.

        **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateHostedLinkRequest" }
      responses:
        "201":
          description: Hosted-link session created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateHostedLinkResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/connections/{id}/relink:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    post:
      tags: [Connections]
      summary: Mint a re-auth hosted-link session for a connection
      description: |
        Creates a hosted-link session pinned to one existing bank connection
        for re-authentication. The user_id, provider, action (`"relink"`),
        connection_id, and `single_use=true` are all derived from the
        connection row — the request body has no say.

        The response shape mirrors `POST /connections/link`, including the
        one-time-only bearer `token` and constructed `url`.

        Returns 404 if the connection doesn't exist; 409 `CONNECTION_DISCONNECTED`
        if the connection is in the `disconnected` state (soft-deleted bank
        connections cannot be recovered via re-auth).

        **Requires `full_access` scope.**
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateHostedLinkRelinkRequest" }
      responses:
        "201":
          description: Hosted-link relink session created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateHostedLinkResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/connections/link/{id}:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    get:
      tags: [Connections]
      summary: Poll a hosted-link session
      description: |
        Returns the current state of a hosted-link session. Accepts either the
        canonical UUID or the 8-char short_id as `{id}`.

        The plaintext bearer `token` and the constructed `url` are returned
        **only** at creation time — this poll endpoint omits them. Use
        `result_connection_ids` (always present, possibly empty) to find the
        connections the user added during the session once `status` reaches
        `completed`.

        Status values: `pending`, `active`, `completed`, `failed`, `expired`.
      responses:
        "200":
          description: Hosted-link session.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HostedLinkSession" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/providers:
    get:
      tags: [Connections]
      summary: List configured providers
      description: |
        Returns the self-describing registry of bank-data providers this server
        supports, including which are configured, their capabilities, and the
        shape of credentials they accept on `POST /connections`.

        Unconfigured providers still appear with `configured: false` so clients
        can render a "set me up" CTA without guessing what providers exist.

        Response is a bare JSON array (bounded resource — see API conventions).
      responses:
        "200":
          description: Provider registry.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ProviderInfo" }
  /api/v1/providers/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema: { type: string, enum: [plaid, teller, csv] }
    get:
      tags: [Connections]
      summary: Get a single provider entry
      description: Same shape as one entry in `GET /providers`.
      responses:
        "200":
          description: Provider entry.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProviderInfo" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Connections]
      summary: Disable a provider
      description: |
        Clears every `app_config` row tied to the named provider (Plaid:
        client_id/secret/env; Teller: app_id/env/cert/key/webhook secret) and
        re-runs the live provider init so the in-memory map drops the
        provider. Existing connections stay in the DB and continue to surface
        in listings, but sync attempts fail until credentials are restored.
        CSV has no credentials and is a no-op.

        **Requires `full_access` scope.**
      responses:
        "200":
          description: Provider disabled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider: { type: string }
                  ok: { type: boolean }
                  message: { type: string }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/providers/{name}/link-session:
    parameters:
      - name: name
        in: path
        required: true
        schema: { type: string, enum: [plaid, teller, csv] }
    post:
      tags: [Connections]
      summary: Start a provider link session
      description: |
        Generic link-token start. Replaces the deprecated provider-specific
        link-token routes.

        - Providers that need a server-issued init token (Plaid today;
          MoneyKit / Salt Edge in the future) return `200 OK` with
          `{link_token, expiration}`.
        - Providers whose hosted UI runs entirely client-side (Teller, CSV)
          return `204 No Content` — the client proceeds straight to
          `POST /connections` with the credentials it collected.

        **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id: { type: string, description: "UUID or short_id" }
      responses:
        "200":
          description: Link token issued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  link_token: { type: string }
                  expiration: { type: string, format: date-time }
        "204": { description: "No init token needed; proceed to POST /connections." }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/providers/{name}/test:
    parameters:
      - name: name
        in: path
        required: true
        schema: { type: string, enum: [plaid, teller, csv] }
    post:
      tags: [Connections]
      summary: Round-trip a provider credentials check
      description: |
        Validates the server-side credentials for the named provider. CSV has
        no credentials and always returns ok=true. Plaid hits
        `/institutions/get` with a tiny payload; Teller validates the stored
        cert/key pair (file path or in-memory PEM) against `crypto/tls`.

        A reachable server with bad credentials still returns 200 with
        `ok=false` and a human-readable message, so CLI agents can branch on
        the JSON without parsing status codes.

        **Requires `full_access` scope.**
      responses:
        "200":
          description: Credential-check result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider: { type: string }
                  ok: { type: boolean }
                  message: { type: string }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/config:
    get:
      tags: [Settings]
      summary: List app_config entries
      description: |
        Returns every row in the `app_config` table with the effective source
        (`env` / `db` / `default`). Secret-flagged values are masked unless
        `?reveal=true` is set. A denylist of keys (`ENCRYPTION_KEY` and the
        Teller cert/key PEM rows) is always masked and never writable via
        this surface — manage them through env vars or the admin UI.

        **Requires `full_access` scope.**
      parameters:
        - name: reveal
          in: query
          required: false
          schema: { type: boolean }
      responses:
        "200":
          description: Config entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    key: { type: string }
                    value: { type: string, nullable: true }
                    masked: { type: boolean }
                    source: { type: string, enum: [env, db, default] }
                    secret: { type: boolean }
  /api/v1/config/{key}:
    parameters:
      - name: key
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Settings]
      summary: Get a single config entry
      description: Same masking + `?reveal=true` semantics as the list endpoint.
      parameters:
        - name: reveal
          in: query
          required: false
          schema: { type: boolean }
      responses:
        "200":
          description: Config entry.
          content:
            application/json:
              schema:
                type: object
                properties:
                  key: { type: string }
                  value: { type: string, nullable: true }
                  masked: { type: boolean }
                  source: { type: string, enum: [env, db, default] }
                  secret: { type: boolean }
    put:
      tags: [Settings]
      summary: Set a config value
      description: |
        Writes the named value to the `app_config` table. The
        always-denied key list (`ENCRYPTION_KEY`, `teller_cert_pem`,
        `teller_key_pem`) returns `403 FORBIDDEN`.

        **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value: { type: string }
      responses:
        "200":
          description: Saved entry.
          content:
            application/json:
              schema:
                type: object
                properties:
                  key: { type: string }
                  value: { type: string, nullable: true }
                  source: { type: string, enum: [env, db, default] }
                  secret: { type: boolean }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      tags: [Settings]
      summary: Remove a db-sourced config value
      description: |
        Drops the `app_config` row. The effective value falls back to env or
        the compile-in default. The always-denied key list returns `403`.

        **Requires `full_access` scope.**
      responses:
        "204": { description: "Key removed." }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/webhook-events:
    get:
      tags: [Webhooks]
      summary: List recent webhook events
      description: |
        Paginated list of inbound provider webhooks (event_type, status,
        connection_id, institution name, created_at). Filters: `provider`,
        `status`, `page`, `limit` (max 200).

        **Requires `full_access` scope.**
      parameters:
        - name: provider
          in: query
          required: false
          schema: { type: string, enum: [plaid, teller] }
        - name: status
          in: query
          required: false
          schema: { type: string, enum: [received, processed, error] }
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200 }
      responses:
        "200":
          description: Page of webhook events.
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook_events:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        provider: { type: string }
                        event_type: { type: string }
                        connection_id: { type: string, nullable: true }
                        institution_name: { type: string, nullable: true }
                        raw_payload_hash: { type: string }
                        status: { type: string }
                        error_message: { type: string, nullable: true }
                        created_at: { type: string, nullable: true }
                  total: { type: integer }
                  page: { type: integer }
                  page_size: { type: integer }
                  total_pages: { type: integer }
  /api/v1/webhook-events/{id}/replay:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [Webhooks]
      summary: Re-trigger the sync the webhook would have caused
      description: |
        The event row's raw payload is hashed-only, so the server can't
        re-deliver it verbatim — instead, it kicks a manual `Sync` against
        the connection the event was associated with. Events without a
        connection return 200 with `triggered: false`.

        **Requires `full_access` scope.**
      responses:
        "200":
          description: Replay result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook_event_id: { type: string }
                  connection_id: { type: string }
                  triggered: { type: boolean }
                  message: { type: string }
        "404": { $ref: "#/components/responses/NotFound" }
        "502": { $ref: "#/components/responses/BadGateway" }
  /api/v1/connections/plaid/link-token:
    post:
      tags: [Connections]
      deprecated: true
      summary: Issue a Plaid Link token
      description: |
        **Deprecated** — use `POST /api/v1/providers/plaid/link-session` instead.
        This route remains as a thin pass-through to the generic dispatch path.

        Returns a Plaid-issued `link_token` for initial connection (or update mode
        when `connection_id` is supplied). **Requires `full_access` scope.**
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Token payload.
          content:
            application/json:
              schema:
                type: object
                properties:
                  link_token: { type: string }
                additionalProperties: true
  /api/v1/connections/plaid/exchange:
    post:
      tags: [Connections]
      deprecated: true
      summary: Exchange a Plaid public_token
      description: |
        **Deprecated** — use `POST /api/v1/connections` with `provider:"plaid"` instead.
        This route remains as a thin pass-through to the generic dispatch path.

        Trades a one-time `public_token` for a long-lived access token, persists
        the connection, and triggers an initial sync. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [public_token]
              properties:
                public_token: { type: string }
                user_id: { type: string }
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "201":
          description: Created connection.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Connection" }
  /api/v1/connections/teller:
    post:
      tags: [Connections]
      deprecated: true
      summary: Create a Teller connection
      description: |
        **Deprecated** — use `POST /api/v1/connections` with `provider:"teller"` instead.
        This route remains as a thin pass-through to the generic dispatch path.

        Persists a Teller `enrollment_id` + access token after the Connect.js flow. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Created connection.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Connection" }
  /api/v1/connections/csv/preview:
    post:
      tags: [Connections]
      summary: Preview a CSV import
      description: |
        Parses a CSV body and returns the inferred column mapping plus a sample of
        rows. No data is persisted. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
          text/csv:
            schema: { type: string }
      responses:
        "200":
          description: Preview.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/connections/csv/import:
    post:
      tags: [Connections]
      deprecated: true
      summary: Import a CSV
      description: |
        **Deprecated** — use `POST /api/v1/connections` with `provider:"csv"` instead.
        This route remains as a thin pass-through to the generic dispatch path.

        Persists CSV rows as transactions under a CSV-type connection. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Import summary.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # -- Sync --
  /api/v1/sync:
    post:
      tags: [Sync]
      summary: Trigger a sync across all active connections
      description: "**Requires `full_access` scope.**"
      responses:
        "202":
          description: Sync started.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/sync/logs:
    get:
      tags: [Sync]
      summary: List sync logs
      description: Cursor-paginated list of sync runs across all connections.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - { name: connection_id, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string, enum: [in_progress, success, error] } }
        - { name: trigger, in: query, schema: { type: string, enum: [cron, webhook, manual, initial] } }
      responses:
        "200":
          description: Sync logs.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SyncLogListResponse" }
  /api/v1/sync/logs/{id}:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    get:
      tags: [Sync]
      summary: Get a sync log
      responses:
        "200":
          description: Sync log.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SyncLog" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/sync/health:
    get:
      tags: [Sync]
      summary: Sync health overview
      description: Fleet-wide sync health (counts of `error`, `pending_reauth`, stale connections).
      responses:
        "200":
          description: Health summary.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/sync/health/providers:
    get:
      tags: [Sync]
      summary: Provider-grouped sync health
      responses:
        "200":
          description: Per-provider health.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/sync/stats:
    get:
      tags: [Sync]
      summary: Sync statistics
      description: Sync run counts and timing aggregates over a configurable window.
      responses:
        "200":
          description: Stats.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # -- Rules --
  /api/v1/rules:
    get:
      tags: [Rules]
      summary: List rules
      description: Cursor-paginated list of transaction rules.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - { name: enabled, in: query, schema: { type: boolean } }
        - { name: category_id, in: query, schema: { type: string } }
        - { name: search, in: query, schema: { type: string } }
        - { name: search_mode, in: query, schema: { type: string, enum: [contains, words, fuzzy] } }
      responses:
        "200":
          description: Rules.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuleListResponse" }
    post:
      tags: [Rules]
      summary: Create rule
      description: "**Requires `full_access` scope.**"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RuleCreate" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Rule" }
  /api/v1/rules/batch:
    post:
      tags: [Rules]
      summary: Batch create rules
      description: Create many rules in a single transaction. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rules]
              properties:
                rules:
                  type: array
                  items: { $ref: "#/components/schemas/RuleCreate" }
      responses:
        "201":
          description: Created rules.
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items: { $ref: "#/components/schemas/Rule" }
  /api/v1/rules/preview:
    post:
      tags: [Rules]
      summary: Preview rule matches
      description: |
        Dry-runs a rule definition against existing transactions and returns the
        first N matches without persisting. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RuleCreate" }
      responses:
        "200":
          description: Preview matches.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/rules/apply-all:
    post:
      tags: [Rules]
      summary: Apply all rules retroactively
      description: |
        Replays every enabled rule against the historical transaction set
        (skipping `category_override = true`). **Requires `full_access` scope.**
      responses:
        "202":
          description: Application summary.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/rules/{id}:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    get:
      tags: [Rules]
      summary: Get rule
      responses:
        "200":
          description: Rule.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Rule" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Rules]
      summary: Update rule
      description: "**Requires `full_access` scope.**"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RuleCreate" }
      responses:
        "200":
          description: Updated rule.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Rule" }
    delete:
      tags: [Rules]
      summary: Delete rule
      description: "**Requires `full_access` scope.**"
      responses:
        "204": { description: Deleted. }
  /api/v1/rules/{id}/apply:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    post:
      tags: [Rules]
      summary: Apply a single rule retroactively
      description: "**Requires `full_access` scope.**"
      responses:
        "202":
          description: Application summary.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/rules/{id}/sync-history:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    get:
      tags: [Rules]
      summary: Rule sync history
      description: Recent sync-time evaluations of this rule.
      responses:
        "200":
          description: History.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # -- Tags --
  /api/v1/tags:
