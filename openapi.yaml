            application/json:
              schema: { $ref: "#/components/schemas/Tag" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Tags]
      summary: Update tag
      description: "**Requires `full_access` scope.**"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated tag.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tag" }
    delete:
      tags: [Tags]
      summary: Delete tag
      description: "**Requires `full_access` scope.**"
