  # -- Users --
  /api/v1/users:
    get:
      tags: [Users]
      summary: List users
      responses:
        "200":
          description: Users.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
    post:
      tags: [Users]
      summary: Create user
      description: "**Requires `full_access` scope.**"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserCreate" }
      responses:
        "201":
          description: Created user.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
  /api/v1/users/{id}:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    get:
      tags: [Users]
      summary: Get user
      responses:
        "200":
          description: User.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Users]
      summary: Update user
      description: "**Requires `full_access` scope.**"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated user.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
    delete:
      tags: [Users]
      summary: Delete user
      description: "**Requires `full_access` scope.**"
      responses:
        "204": { description: Deleted. }
  /api/v1/users/{id}/wipe-data:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    post:
      tags: [Users]
      summary: Wipe a user's connections, accounts, and transactions
      description: |
        Destructive — disconnects every connection owned by this user and
        cascades through accounts/transactions per the FK policy.
        **Requires `full_access` scope.**
      responses:
        "200":
          description: Wipe summary.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/users/{user_id}/login:
    parameters:
      - { name: user_id, in: path, required: true, schema: { type: string } }
    get:
      tags: [Users]
      summary: List a user's login methods
      description: |
        Returns admin login records (email/password, magic-link, etc.) for the
        target user. **Requires `full_access` scope.**
      responses:
        "200":
          description: Logins.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UserLogin" }
    post:
      tags: [Users]
      summary: Create a login method for a user
      description: "**Requires `full_access` scope.**"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Created login.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserLogin" }
  /api/v1/users/{user_id}/login/{login_id}:
    parameters:
      - { name: user_id, in: path, required: true, schema: { type: string } }
      - { name: login_id, in: path, required: true, schema: { type: string } }
    patch:
      tags: [Users]
      summary: Update a login method
      description: "**Requires `full_access` scope.**"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated login.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserLogin" }
    delete:
      tags: [Users]
      summary: Delete a login method
      description: "**Requires `full_access` scope.**"
      responses:
        "204": { description: Deleted. }
  /api/v1/users/{user_id}/login/{login_id}/regenerate-token:
    parameters:
      - { name: user_id, in: path, required: true, schema: { type: string } }
      - { name: login_id, in: path, required: true, schema: { type: string } }
    post:
      tags: [Users]
      summary: Regenerate a login's API/magic-link token
      description: "**Requires `full_access` scope.**"
      responses:
        "200":
          description: Token payload.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/login-accounts:
    get:
      tags: [Users]
      summary: List every login account (flat — no parent user_id)
      description: |
        Top-level convenience for the headless CLI. Identical payload to the
        nested per-user endpoint, but returns the full set across users.
        **Requires `full_access` scope.** `setup_token` is never echoed here.
      responses:
        "200":
          description: Login accounts.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UserLogin" }
  /api/v1/login-accounts/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    delete:
      tags: [Users]
      summary: Delete a login account by its own id (no parent user_id required)
      description: "**Requires `full_access` scope.**"
      responses:
        "204": { description: Deleted. }
  /api/v1/login-accounts/{id}/reset-password:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    post:
      tags: [Users]
      summary: Issue a fresh setup token for a login account
      description: |
        Flat alias for `/users/{user_id}/login/{login_id}/regenerate-token`.
        Response includes the plaintext `setup_token` exactly once.
        **Requires `full_access` scope.**
      responses:
        "200":
          description: Token payload.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # -- Account links --
  /api/v1/account-links:
    get:
      tags: [Account Links]
      summary: List account links
      responses:
        "200":
          description: Account links.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AccountLink" }
    post:
      tags: [Account Links]
      summary: Create account link
      description: "**Requires `full_access` scope.**"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccountLink" }
  /api/v1/account-links/{id}:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    get:
      tags: [Account Links]
      summary: Get account link
      responses:
        "200":
          description: Account link.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccountLink" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Account Links]
      summary: Update account link
      description: "**Requires `full_access` scope.**"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccountLink" }
    delete:
      tags: [Account Links]
      summary: Delete account link
      description: "**Requires `full_access` scope.**"
      responses:
        "204": { description: Deleted. }
  /api/v1/account-links/{id}/matches:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    get:
      tags: [Account Links]
      summary: List transaction matches for a link
      description: Cursor-paginated list of matched transaction pairs across the linked accounts.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - { name: confidence, in: query, schema: { type: string, enum: [auto, confirmed, rejected] } }
      responses:
        "200":
          description: Matches.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/account-links/{id}/reconcile:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    post:
      tags: [Account Links]
      summary: Re-run reconciliation for a link
      description: "**Requires `full_access` scope.**"
      responses:
        "202":
          description: Reconcile summary.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/transaction-matches/{id}/confirm:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    post:
      tags: [Account Links]
      summary: Confirm a transaction match
      description: Promotes an `auto` match to `confirmed`. **Requires `full_access` scope.**
      responses:
        "200":
          description: Updated match.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/transaction-matches/{id}/reject:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    post:
      tags: [Account Links]
      summary: Reject a transaction match
      description: Marks the match `rejected`. **Requires `full_access` scope.**
      responses:
        "200":
          description: Updated match.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/transaction-matches/manual:
    post:
      tags: [Account Links]
      summary: Manually pair two transactions
      description: Creates a `confirmed` match between two transactions. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [primary_transaction_id, mirror_transaction_id]
              properties:
                primary_transaction_id: { type: string }
                mirror_transaction_id: { type: string }
                account_link_id: { type: string }
      responses:
        "201":
          description: Created match.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # -- Reports --
  /api/v1/reports:
    get:
      tags: [Reports]
      summary: List agent reports
      description: Bounded by recency; not cursor-paginated.
      responses:
        "200":
          description: Reports.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Report" }
    post:
      tags: [Reports]
      summary: Submit a report
      description: AI agents call this to record summaries or flagged transactions. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Created report.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Report" }
  /api/v1/reports/unread-count:
    get:
      tags: [Reports]
      summary: Unread report count
      responses:
        "200":
          description: Count.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }
  /api/v1/reports/read-all:
    post:
      tags: [Reports]
      summary: Mark all reports as read
      description: "**Requires `full_access` scope.**"
      responses:
        "204": { description: All marked read. }
  /api/v1/reports/{id}:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    get:
      tags: [Reports]
      summary: Get a report
      responses:
        "200":
          description: Report.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Report" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Reports]
      summary: Delete a report
      description: "**Requires `full_access` scope.**"
      responses:
        "204": { description: Deleted. }
  /api/v1/reports/{id}/read:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    patch:
      tags: [Reports]
      summary: Mark report as read
      description: "**Requires `full_access` scope.**"
      responses:
        "200":
          description: Updated report.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Report" }
  /api/v1/reports/{id}/unread:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    patch:
      tags: [Reports]
      summary: Mark report as unread
      description: "**Requires `full_access` scope.**"
      responses:
        "200":
          description: Updated report.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Report" }

  # -- API keys --
  /api/v1/api-keys:
    get:
      tags: [API Keys]
      summary: List API keys
      description: Returns metadata only (prefix, scope, last_used_at). The plaintext key is never returned. **Requires `full_access` scope.**
      responses:
        "200":
          description: API keys.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/APIKey" }
    post:
      tags: [API Keys]
      summary: Create API key
      description: |
        Returns the plaintext key **once** in `key`. Persist it immediately —
        subsequent reads expose only the prefix. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, scope]
              properties:
                name: { type: string }
                scope: { type: string, enum: [full_access, read_only] }
      responses:
        "201":
          description: Created key (plaintext returned once).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIKey"
                  - type: object
                    properties:
                      key: { type: string, description: Plaintext key. Shown once on creation. }
  /api/v1/api-keys/{id}:
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    delete:
      tags: [API Keys]
      summary: Revoke an API key
      description: Soft-revokes by setting `revoked_at`. **Requires `full_access` scope.**
      responses:
        "204": { description: Revoked. }

  # -- Settings / providers --
  /api/v1/settings/providers:
    get:
      tags: [Settings]
      summary: Get provider configuration
      description: Returns current Plaid + Teller config flags. Secrets are masked.
      responses:
        "200":
          description: Provider config.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProviderConfig" }
  /api/v1/settings/providers/plaid:
    put:
      tags: [Settings]
      summary: Update Plaid configuration
      description: |
        Persists Plaid credentials in the encrypted `app_config` table. Pass null
        for any field to clear it. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated config.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProviderConfig" }
  /api/v1/settings/providers/teller:
    put:
      tags: [Settings]
      summary: Update Teller configuration
      description: |
        Persists Teller credentials (application ID, certificate, key) in the
        encrypted `app_config` table. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated config.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProviderConfig" }

  # -- Agents --
  /api/v1/agents:
    get:
      tags: [Agents]
      summary: List agent definitions
      description: Returns all agent definitions with `last_run` inlined per definition.
      responses:
        "200":
          description: Bare JSON array of agent definitions.
          content:
            application/json:
              schema:
                type: array
                items: { type: object, additionalProperties: true }
    post:
      tags: [Agents]
      summary: Create agent definition
      description: Creates a Claude Agent SDK definition. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "201":
          description: Created definition.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /api/v1/agents/status:
    get:
      tags: [Agents]
      summary: Readiness probe for the agent subsystem
      description: |
        Side-effect-free check that returns whether the agent subsystem
        is ready to fire a run — auth configured + sidecar binary
        discoverable. Used by the v2 SPA list page to surface onboarding
        hints inline. Does NOT call Anthropic; for a live round-trip
        use POST /agents/test instead.
      responses:
        "200":
          description: Readiness report.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/agents/settings:
    get:
      tags: [Agents]
      summary: Get agent subsystem settings
      description: |
        Returns agent.* config from `app_config`. Token fields are masked
        (e.g. `"sk-ant-oat01-XXXXXXXX••••wxyz"`); the full plaintext never
        leaves the server.
      responses:
        "200":
          description: Masked settings.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
    put:
      tags: [Agents]
      summary: Update agent subsystem settings
      description: |
        PATCH-style update of agent.* config. Nil fields are unchanged;
        empty-string for token fields clears the stored encrypted value.
        Token values are AES-256-GCM encrypted at rest. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200":
          description: New masked settings state.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /api/v1/agents/runs/{shortId}:
    parameters:
      - { name: shortId, in: path, required: true, schema: { type: string } }
    get:
      tags: [Agents]
      summary: Get one agent run
      description: Resolves by short_id or UUID.
      responses:
        "200":
          description: Agent run detail.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /api/v1/agents/runs/{shortId}:
    parameters:
      - { name: shortId, in: path, required: true, schema: { type: string } }
    patch:
      tags: [Agents]
      summary: Set or clear the operator note on a run
      description: |
        Body: `{ "note": "..." }`. Empty string clears the field. Capped
        at 2000 chars. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string, maxLength: 2000 }
      responses:
        "200":
          description: Updated run.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /api/v1/agents/runs/{shortId}/transcript:
    parameters:
      - { name: shortId, in: path, required: true, schema: { type: string } }
    get:
      tags: [Agents]
      summary: Stream agent run transcript
      description: Returns the NDJSON transcript file. 404 when not yet written.
      responses:
        "200":
          description: NDJSON stream.
          content:
            application/x-ndjson:
              schema: { type: string }
        "404":
          description: Transcript not available.
  /api/v1/agents/{slug}:
    parameters:
      - { name: slug, in: path, required: true, schema: { type: string }, description: "slug, short_id, or UUID" }
    get:
      tags: [Agents]
      summary: Get one agent definition
      responses:
        "200":
          description: Agent definition with last_run inlined.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
    patch:
      tags: [Agents]
      summary: Partial update of an agent definition
      description: Omitted fields are unchanged. **Requires `full_access` scope.**
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Updated definition.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
    delete:
      tags: [Agents]
      summary: Delete an agent definition
      description: Historical runs preserved (FK SET NULL). **Requires `full_access` scope.**
      responses:
        "204":
          description: Deleted.
  /api/v1/agents/{slug}/runs:
    parameters:
      - { name: slug, in: path, required: true, schema: { type: string } }
      - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
      - { name: offset, in: query, schema: { type: integer, default: 0 } }
    get:
      tags: [Agents]
      summary: List runs for one agent
      description: Offset-paginated run history.
      responses:
        "200":
          description: Paginated runs.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /api/v1/agents/{slug}/enable:
    parameters:
      - { name: slug, in: path, required: true, schema: { type: string } }
    post:
      tags: [Agents]
      summary: Enable an agent
      description: Sets enabled=true. **Requires `full_access` scope.**
      responses:
        "200":
          description: Updated definition.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /api/v1/agents/{slug}/disable:
    parameters:
      - { name: slug, in: path, required: true, schema: { type: string } }
    post:
      tags: [Agents]
      summary: Disable an agent
      description: Sets enabled=false. **Requires `full_access` scope.**
      responses:
        "200":
          description: Updated definition.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /api/v1/agents/test:
    post:
      tags: [Agents]
      summary: Run the agent diagnostic smoke test
      description: |
        Spawns the breadbox-agent sidecar with a tiny "say OK" prompt and
        returns the result. Bypasses agent_definitions, mints no API key,
        writes no agent_runs row. Cost-bounded to ~5¢. **Requires `full_access` scope.**
      responses:
        "200":
          description: Diagnostic result.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "422":
          description: Auth or binary not configured.
        "500":
          description: Test ran but the sidecar / model returned an error.
  /api/v1/agents/{slug}/run:
    parameters:
      - { name: slug, in: path, required: true, schema: { type: string } }
    post:
      tags: [Agents]
      summary: Trigger an immediate agent run
      description: |
        Synchronously runs the named agent. Returns the resulting `agent_runs`
        row. Status may be `success`, `error`, or `timeout`. Optional body
        `{ "prompt_prefix": "..." }` prepends operator-supplied context to
        the agent's stored prompt for this fire only. **Requires `full_access` scope.**
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt_prefix:
                  type: string
                  maxLength: 2000
                  description: Optional per-run prefix prepended to the agent's prompt; cron runs leave it unset.
      responses:
        "201":
          description: Run completed (may be in error state — see `status` and `error_message`).
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "400":
          description: PROMPT_PREFIX_TOO_LONG when prompt_prefix exceeds 2000 chars.
        "422":
          description: Auth or binary not configured.
        "503":
          description: Another run is in progress (CONCURRENCY_LOCKED).

components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Breadbox API key with format `bb_<base62>`. Carries either `read_only`
        or `full_access` scope. Write endpoints (and a handful of sensitive
        reads — `/api-keys`, `/users/{user_id}/login`) require `full_access`;
        endpoints that require it are flagged in their description.

  parameters:
    IDPath:
      name: id
      in: path
      required: true
      description: UUID or 8-char short_id.
      schema: { type: string }
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque pagination cursor returned by a previous list response.
      schema: { type: string }
    Limit:
      name: limit
      in: query
      required: false
      description: Page size (default 50, capped per-endpoint).
      schema: { type: integer, minimum: 1, maximum: 200 }
    Fields:
      name: fields
      in: query
      required: false
      description: |
        Comma-separated field selector. Accepts column names and aliases
        (`minimal`, `core`, `category`, `timestamps`, `triage`, `review_core`,
        `transaction_core`). `id` and `short_id` are always included.
      schema: { type: string }

  responses:
    BadRequest:
      description: Invalid input.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Forbidden:
      description: API key lacks the required scope.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Conflict:
      description: Conflict with current state.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    RateLimited:
      description: Per-key rate limit exceeded.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, description: Stable UPPER_SNAKE_CASE error code. }
            message: { type: string }
    HealthResponse:
      type: object
      properties:
        status: { type: string, enum: [ok, degraded] }
        version: { type: string }
        details:
          type: object
          additionalProperties: true
    VersionResponse:
      type: object
      properties:
        version: { type: string }
        latest: { type: string, nullable: true }
        update_available: { type: boolean }
    HeadlessBootstrapResponse:
      type: object
      description: Readiness/setup summary consumed by `breadbox doctor`.
      required:
        [
          version,
          encryption_key_set,
          database,
          providers,
          users_count,
          login_accounts_count,
          api_keys_count,
          active_connections_count,
          scheduler_running,
          first_run,
        ]
      properties:
        version: { type: string, description: Server build version. }
        encryption_key_set:
          { type: boolean, description: True when ENCRYPTION_KEY is set. }
        database:
          type: object
          required: [connected, migrations_current, migration_version]
          properties:
            connected: { type: boolean }
            migrations_current:
              {
                type: boolean,
                description: True when the applied goose version meets or exceeds the highest embedded migration.,
              }
            migration_version:
              {
                type: integer,
                format: int64,
                description: Highest version_id applied in goose_db_version (0 if unread).,
              }
        providers:
          type: array
          description: Provider configuration status. Order is stable (plaid, teller).
          items:
            type: object
            required: [name, configured]
            properties:
              name: { type: string, enum: [plaid, teller] }
              configured: { type: boolean }
              env:
                {
                  type: string,
                  description: "Environment label (e.g. sandbox, production). Omitted when not configured.",
                }
        users_count:
          { type: integer, format: int64, description: Household user count. }
        login_accounts_count:
          {
            type: integer,
            format: int64,
            description: Admin / dashboard login account count.,
          }
        api_keys_count:
          {
            type: integer,
            format: int64,
            description: Active (un-revoked) API key count.,
          }
        active_connections_count:
          {
            type: integer,
            format: int64,
            description: Bank connections in 'active' status.,
          }
        scheduler_running:
          { type: boolean, description: True when the sync scheduler has active cron entries. }
        first_run:
          {
            type: boolean,
            description: True when `login_accounts_count == 0` — the same signal used by the admin first-run redirect.,
          }
    Account:
      type: object
      properties:
        id: { type: string, format: uuid }
        short_id: { type: string }
        name: { type: string }
        display_name: { type: string, nullable: true }
        official_name: { type: string, nullable: true }
        type: { type: string }
        subtype: { type: string, nullable: true }
        mask: { type: string, nullable: true }
        iso_currency_code: { type: string, nullable: true }
        balance_current: { type: string, nullable: true, description: Decimal as string. }
        balance_available: { type: string, nullable: true }
        balance_limit: { type: string, nullable: true }
        is_excluded: { type: boolean }
        is_dependent_linked: { type: boolean }
        connection_id: { type: string, nullable: true }
        provider: { type: string, enum: [plaid, teller, csv] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true
    AccountUpdate:
      type: object
      properties:
        display_name: { type: string, description: Empty string clears the override. }
        is_excluded: { type: boolean }
        is_dependent_linked: { type: boolean }
    AccountDetail:
      allOf:
        - $ref: "#/components/schemas/Account"
        - type: object
          properties:
            connection_user_name: { type: string }
            connection_short_id: { type: string }
            balances:
              type: array
              items:
                type: object
                properties:
                  iso_currency_code: { type: string }
                  balance_current: { type: string, nullable: true }
                  balance_available: { type: string, nullable: true }
                  balance_limit: { type: string, nullable: true }
            recent_transactions:
              type: array
              items: { $ref: "#/components/schemas/Transaction" }
    Transaction:
      type: object
      properties:
        id: { type: string, format: uuid }
        short_id: { type: string }
        account_id: { type: string }
        connection_id: { type: string, nullable: true }
        attributed_user_id: { type: string, nullable: true }
        date: { type: string, format: date }
        authorized_date: { type: string, format: date, nullable: true }
        amount: { type: string, description: "Decimal as string. Positive = money out, negative = money in." }
        iso_currency_code: { type: string }
        name: { type: string }
        merchant_name: { type: string, nullable: true }
        category_id: { type: string, nullable: true }
        category_override: { type: boolean }
        pending: { type: boolean }
        deleted_at: { type: string, format: date-time, nullable: true }
        tags:
          type: array
          items: { type: string, description: Tag slug. }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true
    TransactionListResponse:
      type: object
      properties:
        transactions:
          type: array
          items: { $ref: "#/components/schemas/Transaction" }
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }
        limit: { type: integer }
    Annotation:
      type: object
      properties:
        id: { type: string }
        short_id: { type: string }
        transaction_id: { type: string }
        actor_type: { type: string, enum: [user, agent, system] }
        actor_id: { type: string, nullable: true }
        actor_name: { type: string, nullable: true }
        kind: { type: string }
        body: { type: string }
        created_at: { type: string, format: date-time }
      additionalProperties: true
    Comment:
      type: object
      properties:
        id: { type: string }
        short_id: { type: string }
        transaction_id: { type: string }
        author_type: { type: string }
        author_id: { type: string, nullable: true }
        body: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true
    Tag:
      type: object
      properties:
        slug: { type: string }
        name: { type: string }
        color: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
      additionalProperties: true
    TagCreate:
      type: object
      required: [slug, name]
      properties:
        slug: { type: string }
        name: { type: string }
        color: { type: string }
    Category:
      type: object
      properties:
        id: { type: string }
        short_id: { type: string }
        name: { type: string }
        parent_id: { type: string, nullable: true }
        kind: { type: string, description: "`income` | `expense` | `transfer`." }
        archived: { type: boolean }
        created_at: { type: string, format: date-time }
      additionalProperties: true
    CategoryCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        parent_id: { type: string, nullable: true }
        kind: { type: string }
    CategoryUpdate:
      type: object
      properties:
        name: { type: string }
        parent_id: { type: string, nullable: true }
        kind: { type: string }
        archived: { type: boolean }
    ProviderInfo:
      type: object
      required: [name, configured, needs_link_session, capabilities, credentials_schema]
      properties:
        name: { type: string, description: "Provider identifier (plaid, teller, csv, ...)" }
        configured: { type: boolean, description: "True when this provider's config is set on this server." }
        needs_link_session: { type: boolean, description: "True when POST /providers/{name}/link-session returns a token; false when it returns 204." }
        capabilities:
          type: array
          items: { type: string }
          description: "Informational; e.g. transactions, balances."
        credentials_schema:
          type: object
          description: "Per-field descriptor for the `credentials` payload on POST /connections."
          additionalProperties:
            type: object
            properties:
              type: { type: string }
              required:
                oneOf:
                  - { type: boolean }
                  - { type: string }
              description: { type: string }
    Connection:
      type: object
      properties:
        id: { type: string }
        short_id: { type: string }
        user_id: { type: string }
        provider: { type: string, enum: [plaid, teller, csv] }
        institution_name: { type: string, nullable: true }
        institution_id: { type: string, nullable: true }
        status: { type: string, enum: [active, error, pending_reauth, disconnected] }
        paused: { type: boolean }
        sync_interval_seconds: { type: integer, nullable: true }
        last_sync_at: { type: string, format: date-time, nullable: true }
        next_sync_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true
    HostedLinkSession:
      type: object
      description: |
        A hosted-link session is the agent-facing record of a "share this URL
        with the user so they can connect a bank in their browser" flow.
        Returned by `GET /connections/link/{id}` and (extended with `token`
        and `url`) by `POST /connections/link`.
      properties:
        id: { type: string }
        short_id: { type: string }
        user_id: { type: string }
        provider:
          type: string
          description: |
            `"plaid"`, `"teller"`, or empty string. Empty means the hosted page
            shows a picker so the user chooses a provider.
          enum: ["", plaid, teller]
        action: { type: string, enum: [link, relink] }
        connection_id:
          type: string
          description: Present only for `action: "relink"` — the connection being re-authenticated.
        single_use: { type: boolean }
        redirect_url:
          type: string
          description: Optional URL the hosted page redirects to after completion.
        label:
          type: string
          description: Optional human-readable label shown in the agent's audit timeline.
        status:
          type: string
          enum: [pending, active, completed, failed, expired, consumed]
        error_code:
          type: string
          description: Present only on `status: "failed"`.
        error_message:
          type: string
          description: Present only on `status: "failed"`.
        result_connection_ids:
          type: array
          items: { type: string }
          description: |
            UUIDs of the bank connections the user added during the session.
            Always present; empty array until at least one connection has been
            recorded.
        expires_at: { type: string, format: date-time }
        started_at:
          type: string
          format: date-time
          nullable: true
          description: Stamped when the hosted page first transitions the session to `active`.
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: Stamped when the session reaches `completed` or `failed`.
        created_at: { type: string, format: date-time }
    CreateHostedLinkRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          description: UUID or short_id of the household user the link is for.
        provider:
          type: string
          description: |
            Optional. Empty / omitted lets the hosted page display a picker.
          enum: ["", plaid, teller]
        single_use:
          type: boolean
          default: false
          description: When true, the session burns after the first successful link.
        redirect_url:
          type: string
          description: Optional URL the hosted page redirects to after completion.
        label:
          type: string
          description: Optional human-readable label for the agent's audit timeline.
        expires_in_seconds:
          type: integer
          minimum: 0
          maximum: 3600
          description: |
            TTL in seconds. `0` (or omitted) selects the default of 900 (15
            minutes). Values above 3600 are rejected.
    CreateHostedLinkRelinkRequest:
      type: object
      description: |
        Body for `POST /connections/{id}/relink`. All fields are optional —
        the connection identity (and therefore the user, provider, and
        single_use flag) comes from the URL path. `user_id` and `provider`
        are deliberately not accepted on this endpoint.
      properties:
        redirect_url:
          type: string
          description: Optional URL the hosted page redirects to after completion.
        label:
          type: string
          description: Optional human-readable label for the agent's audit timeline.
        expires_in_seconds:
          type: integer
          minimum: 0
          maximum: 3600
          description: |
            TTL in seconds. `0` (or omitted) selects the default of 900 (15
            minutes). Values above 3600 are rejected.
    CreateHostedLinkResponse:
      allOf:
        - $ref: "#/components/schemas/HostedLinkSession"
        - type: object
          required: [token, url]
          properties:
            token:
              type: string
              description: |
                Plaintext bearer token. Returned **exactly once** at session
                creation; never echoed back by `GET /connections/link/{id}`.
            url:
              type: string
              format: uri
              description: |
                Fully-qualified URL the end-user should open. Built from the
                request scheme + host + `/link/<token>`.
    SyncLog:
      type: object
      properties:
        id: { type: string }
        short_id: { type: string }
        connection_id: { type: string }
        status: { type: string, enum: [in_progress, success, error] }
        trigger: { type: string, enum: [cron, webhook, manual, initial] }
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time, nullable: true }
        added_count: { type: integer, nullable: true }
        modified_count: { type: integer, nullable: true }
        removed_count: { type: integer, nullable: true }
        error_message: { type: string, nullable: true }
      additionalProperties: true
    SyncLogListResponse:
      type: object
      properties:
        sync_logs:
          type: array
          items: { $ref: "#/components/schemas/SyncLog" }
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }
        limit: { type: integer }
    Rule:
      type: object
      properties:
        id: { type: string }
        short_id: { type: string }
        name: { type: string }
        enabled: { type: boolean }
        priority: { type: integer }
        creator_type: { type: string, enum: [user, agent, system] }
        creator_id: { type: string, nullable: true }
        condition:
          type: object
          additionalProperties: true
          description: Recursive AND/OR/NOT condition tree. See `docs/rule-dsl.md`.
        actions:
          type: array
          items:
            type: object
            additionalProperties: true
        triggers:
          type: array
          items: { type: string, enum: [sync, retroactive, manual] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true
    RuleCreate:
      type: object
      required: [name, condition, actions]
      properties:
        name: { type: string }
        enabled: { type: boolean }
        priority: { type: integer }
        condition:
          type: object
          additionalProperties: true
        actions:
          type: array
          items:
            type: object
            additionalProperties: true
        triggers:
          type: array
          items: { type: string, enum: [sync, retroactive, manual] }
    RuleListResponse:
      type: object
      properties:
        rules:
          type: array
          items: { $ref: "#/components/schemas/Rule" }
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }
        limit: { type: integer }
    User:
      type: object
      properties:
        id: { type: string }
        short_id: { type: string }
        name: { type: string }
        kind: { type: string, enum: [admin, member, dependent] }
        email: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
      additionalProperties: true
    UserCreate:
      type: object
      required: [name, kind]
      properties:
        name: { type: string }
        kind: { type: string, enum: [admin, member, dependent] }
        email: { type: string }
    UserLogin:
      type: object
      properties:
        id: { type: string }
        short_id: { type: string }
        user_id: { type: string }
        kind: { type: string, description: "`password`, `magic_link`, etc." }
        identifier: { type: string, nullable: true }
        last_used_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
      additionalProperties: true
    AccountLink:
      type: object
      properties:
        id: { type: string }
        short_id: { type: string }
        primary_account_id: { type: string }
        mirror_account_id: { type: string }
        kind: { type: string }
        confidence: { type: string, enum: [auto, confirmed, rejected] }
        created_at: { type: string, format: date-time }
      additionalProperties: true
    Report:
      type: object
      properties:
        id: { type: string }
        short_id: { type: string }
        title: { type: string }
        body: { type: string }
        kind: { type: string }
        author_type: { type: string }
        author_id: { type: string, nullable: true }
        read_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
      additionalProperties: true
    APIKey:
      type: object
      properties:
        id: { type: string }
        short_id: { type: string }
        name: { type: string }
        prefix: { type: string }
