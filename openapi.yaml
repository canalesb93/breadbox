        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tag" }
  /api/v1/tags/{slug}:
    parameters:
      - { name: slug, in: path, required: true, schema: { type: string } }
    get:
      tags: [Tags]
      summary: Get tag
      responses:
        "200":
          description: Tag.
