{{define "content"}}
<h1>API Key Created</h1>
<div data-flash="success" style="padding: var(--bb-gap-md) 1.25rem; margin-bottom: var(--bb-gap-lg);">
  <strong>Your API key has been created.</strong> Copy it now — you won't be able to see it again.
</div>
<label>
  API Key Name
  <input type="text" value="{{.KeyName}}" readonly>
</label>
<label>
  API Key
  <input type="text" value="{{.PlaintextKey}}" readonly id="api-key-value" style="font-family: monospace;">
</label>
<div style="margin-top: var(--bb-gap-md);" x-data="{ copied: false }">
  <button @click="navigator.clipboard.writeText(document.getElementById('api-key-value').value).then(function(){ $data.copied = true; setTimeout(function(){ $data.copied = false; }, 2000); })">
    <span x-show="!copied">Copy to Clipboard</span>
    <span x-show="copied" x-cloak>Copied!</span>
  </button>
  <a href="/admin/api-keys" role="button" class="secondary outline" style="margin-left: 0.5rem;">Done</a>
</div>
<p class="mt-6 text-sm text-base-content/60">
  Use this key in the <code>X-API-Key</code> header when making API requests.
</p>
{{end}}
