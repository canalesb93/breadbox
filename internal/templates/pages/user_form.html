{{define "content"}}
{{template "breadcrumb" .}}

<div class="bb-page-header">
  <div>
    <h1 class="bb-page-title">{{if .IsEdit}}Edit {{.User.Name}}{{else}}Add Member{{end}}</h1>
    <p class="text-sm text-base-content/50 mt-1">{{if .IsEdit}}Update member details{{else}}Add a new person to your household{{end}}</p>
  </div>
  <a href="/users" class="btn btn-sm btn-ghost rounded-xl gap-2">
    <i data-lucide="arrow-left" class="w-4 h-4"></i> Household
  </a>
</div>

{{if not .IsEdit}}
<div x-data="userForm()" class="max-w-lg">
  <!-- Success state: show setup URL after login creation -->
  <template x-if="setupURL">
    <div class="bb-card p-8">
      <div class="flex items-center gap-3 mb-6">
        <div class="flex items-center justify-center w-10 h-10 rounded-xl bg-success/10">
          <i data-lucide="check-circle" class="w-5 h-5 text-success"></i>
        </div>
        <div>
          <h2 class="text-base font-semibold">Member Created</h2>
          <p class="text-xs text-base-content/45">Share the setup link so they can set their password</p>
        </div>
      </div>

      <p class="text-sm text-base-content/60 mb-4">Share this link with the new member so they can set their password and start using Breadbox.</p>

      <div class="flex items-center gap-2 mb-4" x-data="{ copied: false }">
        <input type="text" :value="setupURL" readonly
               class="input input-bordered input-sm rounded-xl flex-1 text-xs font-mono bg-base-200 select-all cursor-text">
        <button @click="navigator.clipboard.writeText(setupURL); copied = true; setTimeout(() => copied = false, 2000)"
                class="btn btn-sm btn-primary rounded-xl" :class="copied ? 'btn-success' : ''">
          <i x-show="!copied" data-lucide="copy" class="w-4 h-4"></i>
          <i x-show="copied" data-lucide="check" class="w-4 h-4"></i>
          <span x-text="copied ? 'Copied!' : 'Copy Link'"></span>
        </button>
      </div>

      <p class="text-xs text-base-content/40 mb-6">This link expires in 7 days. You can regenerate it from the Household page.</p>

      <a href="/users" class="btn btn-ghost btn-sm rounded-xl">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        Back to Household
      </a>
    </div>
  </template>

  <!-- Form state -->
  <template x-if="!setupURL">
    <div class="bb-card p-8">
      <div class="flex items-center gap-3 mb-6">
        <div class="flex items-center justify-center w-10 h-10 rounded-xl bg-primary/8">
          <i data-lucide="user-plus" class="w-5 h-5 text-primary"></i>
        </div>
        <div>
          <h2 class="text-base font-semibold">New Member</h2>
          <p class="text-xs text-base-content/45">Enter their name and optional email</p>
        </div>
      </div>

      <form @submit.prevent="submit()">
        <fieldset class="fieldset mb-5">
          <label class="text-sm font-medium text-base-content/70 mb-1.5 block" for="name">
            Name <span class="text-error text-xs">*</span>
          </label>
          <input type="text" id="name" name="name" class="input input-bordered w-full rounded-xl" required maxlength="128"
            placeholder="e.g., Alex Canales">
        </fieldset>

        <fieldset class="fieldset mb-5">
          <label class="text-sm font-medium text-base-content/70 mb-1.5 block" for="email">
            Email
            <span x-show="!createLogin" class="text-xs text-base-content/30">(optional)</span>
            <span x-show="createLogin" class="text-xs text-warning">(required for login)</span>
          </label>
          <input type="email" id="email" name="email" class="input input-bordered w-full rounded-xl"
            :required="createLogin"
            placeholder="e.g., alex@example.com">
        </fieldset>

        <!-- Create login account toggle (new users only) -->
        <div class="border-t border-base-300 pt-5 mb-6">
          <label class="flex items-center justify-between cursor-pointer">
            <div>
              <span class="text-sm font-medium text-base-content/70">Create login account</span>
              <p class="text-xs text-base-content/40 mt-0.5">Allow this member to sign in to Breadbox</p>
            </div>
            <input type="checkbox" x-model="createLogin" class="toggle toggle-primary toggle-sm">
          </label>

          <!-- Role dropdown (shown when toggle is on) -->
          <div x-show="createLogin" x-collapse>
            <fieldset class="fieldset mt-4">
              <label class="text-sm font-medium text-base-content/70 mb-1.5 block" for="login_role">
                Role
              </label>
              <select id="login_role" name="login_role" x-model="role" class="select select-bordered w-full rounded-xl bg-base-200">
                <option value="viewer">Viewer &mdash; can only see their own data</option>
                <option value="editor">Editor &mdash; can view and edit all household data</option>
              </select>
            </fieldset>
          </div>
        </div>

        <template x-if="error">
          <div class="rounded-xl bg-error/10 border border-error/20 text-error text-sm px-4 py-3 mb-4" x-text="error"></div>
        </template>

        <div class="flex gap-3 pt-2">
          <button type="submit" class="btn btn-primary btn-sm rounded-xl whitespace-nowrap" :disabled="submitting">
            <span x-show="!submitting" class="inline-flex items-center gap-1.5"><i data-lucide="plus" class="w-4 h-4"></i> Create Member</span>
            <span x-show="submitting" class="loading loading-spinner loading-sm"></span>
          </button>
          <a href="/users" class="btn btn-ghost btn-sm rounded-xl">Cancel</a>
        </div>
      </form>
    </div>
  </template>
</div>

<script>
function userForm() {
  return {
    createLogin: false,
    role: 'viewer',
    submitting: false,
    error: '',
    setupURL: '',

    submit() {
      this.error = '';
      var name = document.getElementById('name').value.trim();
      var email = document.getElementById('email').value.trim();

      if (!name) {
        this.error = 'Name is required.';
        return;
      }

      if (this.createLogin && !email) {
        this.error = 'Email is required when creating a login account.';
        return;
      }

      if (this.createLogin && email && (!email.includes('@') || !email.includes('.'))) {
        this.error = 'Please enter a valid email address.';
        return;
      }

      var body = { name: name };
      if (email) {
        body.email = email;
      }

      var self = this;
      self.submitting = true;

      // Step 1: Create the user.
      fetch('/-/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      })
      .then(function (res) {
        if (!res.ok) return res.json().then(function (d) { throw d; });
        return res.json();
      })
      .then(function (userData) {
        if (!self.createLogin) {
          // No login account needed -- redirect.
          window.location.href = '/users?created=1';
          return;
        }

        // Step 2: Create login account.
        return fetch('/-/members', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_id: userData.id,
            username: email,
            role: self.role
          })
        })
        .then(function (res) {
          if (!res.ok) return res.json().then(function (d) { throw d; });
          return res.json();
        })
        .then(function (loginData) {
          self.submitting = false;
          if (loginData.setup_token) {
            self.setupURL = window.location.origin + '/setup-account/' + loginData.setup_token;
            // Re-initialize Lucide icons for the success state.
            self.$nextTick(function () { if (window.lucide) lucide.createIcons(); });
          } else {
            window.location.href = '/users?created=1';
          }
        });
      })
      .catch(function (e) {
        self.submitting = false;
        if (window.bbProgress) window.bbProgress.finish();
        var main = document.querySelector('main');
        if (main) { main.style.opacity = ''; main.style.filter = ''; main.style.pointerEvents = ''; }
        self.error = (e.error && typeof e.error === 'object' && e.error.message) || (e.error && typeof e.error === 'string' && e.error) || 'An error occurred.';
      });
    }
  };
}
</script>

{{else}}
<!-- Edit mode uses the simpler form without login toggle -->
<div class="bb-card p-8 max-w-lg">
  <div class="flex items-center gap-3 mb-6">
    <div class="flex items-center justify-center w-10 h-10 rounded-xl bg-primary/8">
      <i data-lucide="user-pen" class="w-5 h-5 text-primary"></i>
    </div>
    <div>
      <h2 class="text-base font-semibold">Member Details</h2>
      <p class="text-xs text-base-content/45">Update name and email</p>
    </div>
  </div>

  <form id="user-form">
    <fieldset class="fieldset mb-5">
      <label class="text-sm font-medium text-base-content/70 mb-1.5 block" for="name">
        Name <span class="text-error text-xs">*</span>
      </label>
      <input type="text" id="name" name="name" class="input input-bordered w-full rounded-xl" required maxlength="128"
        value="{{.User.Name}}"
        placeholder="e.g., Alex Canales">
    </fieldset>

    <fieldset class="fieldset mb-6">
      <label class="text-sm font-medium text-base-content/70 mb-1.5 block" for="email">
        Email <span class="text-xs text-base-content/30">(optional)</span>
      </label>
      <input type="email" id="email" name="email" class="input input-bordered w-full rounded-xl"
        value="{{if .User.Email.Valid}}{{.User.Email.String}}{{end}}"
        placeholder="e.g., alex@example.com">
    </fieldset>

    <div id="form-error" class="rounded-xl bg-error/10 border border-error/20 text-error text-sm px-4 py-3 mb-4 hidden"></div>

    <div class="flex gap-3 pt-2">
      <button type="submit" class="btn btn-primary btn-sm rounded-xl whitespace-nowrap">
        <span class="inline-flex items-center gap-1.5"><i data-lucide="save" class="w-4 h-4"></i> Save Changes</span>
      </button>
      <a href="/users" class="btn btn-ghost btn-sm rounded-xl">Cancel</a>
    </div>
  </form>
</div>

<script>
(function () {
  var form = document.getElementById("user-form");
  var formError = document.getElementById("form-error");
  var userId = "{{.UserID}}";

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    formError.classList.add("hidden");

    var name = document.getElementById("name").value.trim();
    var email = document.getElementById("email").value.trim();

    if (!name) {
      formError.textContent = "Name is required.";
      formError.classList.remove("hidden");
      return;
    }

    var body = {name: name, email: email || ""};

    fetch("/-/users/" + userId, {
      method: "PUT",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body)
    })
    .then(function (res) {
      if (res.ok) {
        window.location.href = "/users";
      } else {
        return res.json().then(function (data) {
          var msg = "An error occurred.";
          if (data.error && typeof data.error === "object" && data.error.message) {
            msg = data.error.message;
          } else if (data.error && typeof data.error === "string") {
            msg = data.error;
          }
          formError.textContent = msg;
          formError.classList.remove("hidden");
        });
      }
    })
    .catch(function () {
      formError.textContent = "Network error. Please try again.";
      formError.classList.remove("hidden");
    });
  });
})();
</script>
{{end}}
{{end}}
