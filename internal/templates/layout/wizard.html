{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{if .PageTitle}}{{.PageTitle}} — Breadbox{{else}}Breadbox Setup{{end}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    [data-flash="success"] {
      background: color-mix(in srgb, var(--pico-color-green-550) 20%, transparent);
      color: var(--pico-color-green-550);
      padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1.25rem;
    }
    [data-flash="error"] {
      background: color-mix(in srgb, var(--pico-color-red-550) 20%, transparent);
      color: var(--pico-color-red-550);
      padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1.25rem;
    }
    [data-flash="info"] {
      background: color-mix(in srgb, var(--pico-color-cyan-550) 20%, transparent);
      color: var(--pico-color-cyan-550);
      padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1.25rem;
    }
      .bb-wizard { max-width: 480px; margin: 3rem auto; padding: 0 1rem; }
  </style>
</head>
<body>
  <main class="bb-wizard">
    {{if .StepNumber}}
    <hgroup>
      <h1>Breadbox Setup</h1>
      <p>Step {{.StepNumber}} of 5</p>
    </hgroup>
    {{end}}
    {{template "flash" .}}
    {{block "content" .}}{{end}}
  </main>
</body>
</html>
{{end}}
