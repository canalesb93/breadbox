{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{if .PageTitle}}{{.PageTitle}} — Breadbox{{else}}Breadbox Setup{{end}}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }</style>
</head>
<body class="bb-wizard-bg">
  <!-- Subtle decorative gradient orb -->
  <div class="bb-wizard-orb"></div>

  <div class="bb-wizard-container">
    <!-- Brand mark -->
    <div class="bb-wizard-brand">
      <div class="bb-wizard-brand-icon">
        <i data-lucide="package" class="w-6 h-6"></i>
      </div>
    </div>

    <!-- Card -->
    <div class="bb-wizard-card">
      {{if .StepNumber}}
      <div class="text-center mb-6">
        <p class="text-xs font-medium text-base-content/40">Setup — Step {{.StepNumber}} of 6</p>
      </div>
      {{end}}
      {{template "flash" .}}
      {{block "content" .}}{{end}}
    </div>

    <!-- Footer -->
    <p class="text-center text-xs text-base-content/30 mt-8">
      Breadbox &mdash; Financial data for households
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js" integrity="sha384-uTYyvsSSUZeaPhb5RbKlQa0zY/WpX/QHfvg2mczXyBQOpkWPEDy9lczyp+w7SKXu" crossorigin="anonymous"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
{{end}}
