{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{if .PageTitle}}{{.PageTitle}} — Breadbox{{else}}Breadbox Setup{{end}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    :root {
      --bb-color-success: #2e7d32;
      --bb-color-error: #c62828;
      --bb-color-cyan: #00838f;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bb-color-success: #66bb6a;
        --bb-color-error: #ef5350;
        --bb-color-cyan: #4dd0e1;
      }
    }
    [data-flash="success"] {
      background: color-mix(in srgb, var(--bb-color-success) 20%, transparent);
      color: var(--bb-color-success);
      padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1.25rem;
    }
    [data-flash="error"] {
      background: color-mix(in srgb, var(--bb-color-error) 20%, transparent);
      color: var(--bb-color-error);
      padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1.25rem;
    }
    [data-flash="info"] {
      background: color-mix(in srgb, var(--bb-color-cyan) 20%, transparent);
      color: var(--bb-color-cyan);
      padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1.25rem;
    }
    .bb-wizard { max-width: 480px; margin: 3rem auto; padding: 0 1rem; }
  </style>
</head>
<body>
  <main class="bb-wizard">
    {{if .StepNumber}}
    <hgroup>
      <h1>Breadbox Setup</h1>
      <p>Step {{.StepNumber}} of 5</p>
    </hgroup>
    {{end}}
    {{template "flash" .}}
    {{block "content" .}}{{end}}
  </main>
</body>
</html>
{{end}}
