{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.PageTitle}} — Breadbox</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }</style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="drawer lg:drawer-open">
    <input id="bb-drawer" type="checkbox" class="drawer-toggle" />

    <!-- Main content -->
    <div class="drawer-content bg-base-200">
      <!-- Mobile navbar -->
      <div class="navbar bg-base-100 lg:hidden border-b border-base-300">
        <div class="flex-none">
          <label for="bb-drawer" class="btn btn-square btn-ghost">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </label>
        </div>
        <div class="flex-1">
          <span class="text-lg font-bold">Breadbox</span>
        </div>
      </div>
      <!-- Page content -->
      <main class="p-4 sm:p-6 max-w-6xl min-h-screen bb-page-enter">
        {{template "flash" .}}
        {{block "content" .}}{{end}}
      </main>
    </div>

    <!-- Sidebar -->
    <div class="drawer-side">
      <label for="bb-drawer" aria-label="close sidebar" class="drawer-overlay"></label>
      <aside class="bb-sidebar">
        <!-- Brand -->
        <a href="/" class="bb-sidebar-brand">
          <i data-lucide="package" class="w-5 h-5"></i>
          Breadbox
        </a>
        {{template "nav" .}}
      </aside>
    </div>
  </div>

  <!-- Global toast -->
  <div class="toast toast-end toast-bottom z-50"
       x-data="{ toasts: [] }"
       @bb-toast.window="
         toasts.push({ message: $event.detail.message, type: $event.detail.type || 'info', id: Date.now() });
         setTimeout(() => toasts.shift(), 4000)
       ">
    <template x-for="t in toasts" :key="t.id">
      <div class="alert rounded-lg border border-base-300"
           :class="{
             'alert-success': t.type === 'success',
             'alert-error': t.type === 'error',
             'alert-warning': t.type === 'warning',
             'alert-info': t.type === 'info'
           }">
        <span x-text="t.message"></span>
      </div>
    </template>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
{{end}}
