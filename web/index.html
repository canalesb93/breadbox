<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover activates env(safe-area-inset-*) on edge-to-edge
         iOS devices (notch / Dynamic Island / home indicator). Without it,
         the insets resolve to 0 and the browser chrome eats into content.
         We deliberately do NOT set user-scalable=no or maximum-scale=1 —
         both block accessibility zoom on iOS. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Disable iOS Safari's automatic phone-number detection. iOS scans
         text for digit sequences that resemble phone numbers and rewrites
         them into blue tap-to-call links — which mangles the numeric data
         a finance app is full of: masked account numbers (••4523),
         transaction reference IDs, routing numbers, even some amount /
         date formats. We have no legitimate `tel:` links, so turning the
         heuristic off globally is pure upside. -->
    <meta name="format-detection" content="telephone=no" />

    <title>Breadbox — Self-hosted finance for households</title>
    <meta
      name="description"
      content="Aggregate Plaid, Teller, and CSV bank data into one Postgres database you control. AI-ready via MCP, deploys as a single Go binary."
    />

    <!-- Branding / browser chrome.

         The favicon and theme-color match the v2 primary token in
         `web/src/globals.css` (oklch(0.205 0 0) ≈ #1a1a1a) and the
         `BrandHeader` lockup so the tab icon reads as a smaller copy
         of the in-app brand mark. -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <!-- PNG fallback for legacy / mail clients that don't render SVG favicons.
         32 = browser tab. 180 = iOS home screen (apple-touch-icon below). -->
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />

    <!-- iOS web-app metadata.

         `apple-mobile-web-app-capable=yes` lets the page run in
         standalone mode (no Safari chrome) when "Add to Home Screen"
         is used — the navbar / sticky header take over the top of
         the screen as if it were a native app.

         `apple-mobile-web-app-status-bar-style=black-translucent`
         extends the app content under the iOS status bar; combined
         with the `viewport-fit=cover` + safe-area padding we ship
         in #1318, the content reads edge-to-edge.

         `apple-mobile-web-app-title` is the icon label on the home
         screen (defaults to the page title if missing).

         `apple-touch-icon` is the home-screen icon. iOS Safari prefers a
         PNG at exactly 180×180 over the SVG fallback (iOS 14+ ignores
         non-PNG apple-touch-icons in some cases). Both are declared so
         every browser picks the format it likes; vector ships as the
         universal fallback. `manifest.webmanifest` carries the 192/512
         PNGs Android + the PWA install prompt need.

         Icons regenerate via `bun run generate-icons` whenever
         `favicon.svg` changes. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Breadbox" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png" />
    <link rel="apple-touch-icon" href="./favicon.svg" />
    <link rel="manifest" href="./manifest.webmanifest" />

    <!-- Open Graph — Slack / Discord / iMessage / Linear link previews. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Breadbox" />
    <meta property="og:title" content="Breadbox — Self-hosted finance for households" />
    <meta
      property="og:description"
      content="Aggregate Plaid, Teller, and CSV bank data into one Postgres database you control. AI-ready via MCP, deploys as a single Go binary."
    />
    <meta property="og:image" content="./og-image.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Breadbox — self-hosted finance for households. Encrypted at rest, MCP-native, single binary." />

    <!-- Twitter / X card. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Breadbox — Self-hosted finance for households" />
    <meta
      name="twitter:description"
      content="Aggregate Plaid, Teller, and CSV bank data into one Postgres database you control."
    />
    <meta name="twitter:image" content="./og-image.svg" />

    <script>
      // No-flash theme bootstrap. Inline + synchronous so the first paint
      // never flashes the wrong theme. Reads the same `breadbox:theme`
      // storage key that `<ThemeProvider>` (from next-themes, in
      // `components/theme-provider.tsx`) writes — so a user who picked
      // "Dark" in the NavUser menu reloads to dark, not to whatever the
      // OS happens to be. Falls back to the OS preference whenever the
      // stored value is missing or "system" (next-themes' contract).
      (function () {
        try {
          var stored = window.localStorage.getItem("breadbox:theme");
          var mql = window.matchMedia("(prefers-color-scheme: dark)");
          function resolve() {
            if (stored === "dark") return true;
            if (stored === "light") return false;
            return mql.matches;
          }
          function apply() {
            document.documentElement.classList.toggle("dark", resolve());
          }
          apply();
          // Track OS changes only while the user is on "system" (or has
          // not chosen yet). next-themes owns the explicit case once the
          // React tree mounts and re-applies on its own.
          mql.addEventListener("change", function () {
            if (!stored || stored === "system") apply();
          });
        } catch (_) {
          // localStorage unavailable (e.g. private window with strict
          // settings) — leave the default light theme alone.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Cold-load splash: shown until the Vite bundle hydrates the SPA
           (~200-500ms on cold mobile cache). React's createRoot replaces
           the contents on first render, so this disappears automatically.
           Uses raw hex values + media query (Tailwind isn't loaded yet)
           and respects the `<html class="dark">` set by the no-flash
           bootstrap script above. -->
      <style>
        .app-splash {
          position: fixed;
          inset: 0;
          display: grid;
          place-items: center;
          background: #fafafa;
          color: #1a1a1a;
        }
        @media (prefers-color-scheme: dark) {
          .app-splash { background: #1a1a1a; color: #fafafa; }
        }
        html.dark .app-splash { background: #1a1a1a; color: #fafafa; }
        .app-splash svg { width: 32px; height: 32px; opacity: 0.4; animation: app-splash-spin 1s linear infinite; }
        @keyframes app-splash-spin { to { transform: rotate(360deg); } }
        @media (prefers-reduced-motion: reduce) { .app-splash svg { animation: none; opacity: 0.6; } }
      </style>
      <div class="app-splash" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-6.219-8.56" />
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
