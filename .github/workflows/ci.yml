name: CI/CD

on:
  pull_request:
    branches: [main, "stack/**"]
  merge_group:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: breadbox
          POSTGRES_PASSWORD: breadbox
          POSTGRES_DB: breadbox_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U breadbox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install sqlc and generate
        run: |
          curl -sL https://github.com/sqlc-dev/sqlc/releases/download/v1.30.0/sqlc_1.30.0_linux_amd64.tar.gz | tar xz -C /usr/local/bin sqlc
          sqlc generate

      - name: Install templ and generate
        run: |
          go install github.com/a-h/templ/cmd/templ@latest
          templ generate
          # Fail fast if the committed *.templ files don't regenerate to the
          # *_templ.go already in the tree (they shouldn't exist in git, but
          # if someone lands a manual edit this surfaces it).
          if ! git diff --exit-code --name-only -- '*_templ.go'; then
            echo "::error::templ generated files drifted — run 'make templ' locally and commit"
            exit 1
          fi

      - name: Build CSS
        run: make css

      - name: Check for duplicate migration versions
        run: |
          dupes=$(ls internal/db/migrations/*.sql | sed 's/.*\///' | sed 's/_.*//' | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "::error::Duplicate migration version(s): $dupes"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run migrations
        env:
          DATABASE_URL: postgres://breadbox:breadbox@localhost:5432/breadbox_test?sslmode=disable
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          goose -dir internal/db/migrations postgres "$DATABASE_URL" up

      - name: Run unit tests
        run: go test ./...

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://breadbox:breadbox@localhost:5432/breadbox_test?sslmode=disable
        run: go test -tags integration -count=1 -p 1 ./...

  build:
    name: Build & Push
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/canalesb93/breadbox
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}

      - name: Determine VERSION build arg
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Release Binaries
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install sqlc and generate
        run: |
          curl -sL https://github.com/sqlc-dev/sqlc/releases/download/v1.30.0/sqlc_1.30.0_linux_amd64.tar.gz | tar xz -C /usr/local/bin sqlc
          sqlc generate

      - name: Install templ and generate
        run: |
          go install github.com/a-h/templ/cmd/templ@latest
          templ generate

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${{ github.ref_name }}
          go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o breadbox-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/breadbox

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: breadbox-${{ matrix.goos }}-${{ matrix.goarch }}
          path: breadbox-${{ matrix.goos }}-${{ matrix.goarch }}

  publish-release:
    name: Publish Release
    needs: [release, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum breadbox-* > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/breadbox-*
            artifacts/SHA256SUMS

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment: breadbox-dev
    if: github.repository == 'canalesb93/breadbox' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 5
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: cd ${{ secrets.DEPLOY_PATH }} && docker compose pull && docker compose up -d

      - name: Verify health
        run: |
          sleep 5
          for i in 1 2 3 4 5; do
            if curl -sf "https://${{ secrets.DEPLOY_HOST }}/health/ready"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
