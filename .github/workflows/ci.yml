name: CI/CD

on:
  pull_request:
    branches: [main, "stack/**", "feat/**", "agents/**"]
  merge_group:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  test-shards:
    # Integration tests are sharded across parallel jobs so the two
    # heavy packages (api, service) don't run end-to-end on one
    # runner. api+service alone are ~76% of integration time. The
    # `test` aggregator below collapses the matrix into one required
    # check named "Test" for the branch ruleset.
    name: Test (${{ matrix.shard.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: api
            packages: ./internal/api/...
            run_unit: false
          - name: service
            packages: ./internal/service/...
            run_unit: false
          - name: rest
            # Everything except api + service. Also carries go vet and
            # the untagged unit-test suite for the whole repo, since
            # those don't shard cleanly and are cheap (~20s combined).
            packages: $(go list ./... | grep -v -E '^breadbox/internal/(api|service)(/|$)' | tr '\n' ' ')
            run_unit: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: breadbox
          POSTGRES_PASSWORD: breadbox
          POSTGRES_DB: breadbox_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U breadbox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Cache generator binaries (sqlc, templ, goose)
        id: gen-cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/sqlc
            ~/go/bin/templ
            ~/go/bin/goose
          # Version-keyed so a bump (sqlc release, templ tag, goose
          # release) invalidates cleanly.
          key: ${{ runner.os }}-gentools-sqlc1.30.0-templ-latest-goose-latest-v1

      - name: Install sqlc
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: curl -sL https://github.com/sqlc-dev/sqlc/releases/download/v1.30.0/sqlc_1.30.0_linux_amd64.tar.gz | tar xz -C /usr/local/bin sqlc

      - name: Install templ
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Install goose
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Generate sqlc
        run: |
          sqlc generate
          # Prepend //go:build !lite to every generated file so they're
          # excluded from -tags=lite builds. Mirrors `make sqlc-tag`.
          for f in internal/db/db.go internal/db/models.go internal/db/*.sql.go; do
            if [ -f "$f" ] && ! head -1 "$f" | grep -q '^//go:build'; then
              printf '//go:build !lite\n\n' | cat - "$f" > "$f.tmp" && mv "$f.tmp" "$f"
            fi
          done

      - name: Generate templ
        run: |
          templ generate
          # Prepend //go:build !headless && !lite to every generated templ
          # file in internal/templates/components. Mirrors `make templ`.
          find internal/templates/components -name '*_templ.go' -print0 | while IFS= read -r -d '' f; do
            if ! head -1 "$f" | grep -q '^//go:build'; then
              printf '//go:build !headless && !lite\n\n' | cat - "$f" > "$f.tmp" && mv "$f.tmp" "$f"
            fi
          done
          # Fail fast if the committed *.templ files don't regenerate to the
          # *_templ.go already in the tree (they shouldn't exist in git, but
          # if someone lands a manual edit this surfaces it).
          if ! git diff --exit-code --name-only -- '*_templ.go'; then
            echo "::error::templ generated files drifted — run 'make templ' locally and commit"
            exit 1
          fi

      - name: Build CSS
        run: make css

      # The v2 SPA bundle is intentionally NOT built here: //go:embed
      # all:dist is satisfied by the committed web/dist/.gitkeep, and
      # no test exercises the bundle's content. Bundle build lives in
      # the release/docker-build jobs that actually ship the binary.

      - name: Check for duplicate migration versions
        if: matrix.shard.run_unit
        run: |
          dupes=$(ls internal/db/migrations/*.sql | sed 's/.*\///' | sed 's/_.*//' | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "::error::Duplicate migration version(s): $dupes"
            exit 1
          fi

      - name: Run go vet
        if: matrix.shard.run_unit
        run: go vet ./...

      - name: Run migrations
        env:
          DATABASE_URL: postgres://breadbox:breadbox@localhost:5432/breadbox_test?sslmode=disable
        run: goose -dir internal/db/migrations postgres "$DATABASE_URL" up

      - name: Run unit tests
        if: matrix.shard.run_unit
        run: go test ./...

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://breadbox:breadbox@localhost:5432/breadbox_test?sslmode=disable
        run: go test -tags integration -count=1 -p 1 ${{ matrix.shard.packages }}

  # Aggregator that the branch ruleset's required status check ("Test")
  # targets. Without this, the rename to "Test (api)" / "Test (service)"
  # / "Test (rest)" would leave the required "Test" check in Expected
  # state forever. Keeping the gate as a single name also means future
  # shard count changes don't require ruleset edits.
  test:
    name: Test
    needs: test-shards
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all shards passed
        run: |
          if [ "${{ needs.test-shards.result }}" != "success" ]; then
            echo "::error::One or more test shards failed: ${{ needs.test-shards.result }}"
            exit 1
          fi
          echo "All shards green"

  test-headless:
    name: Test (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install sqlc and generate
        run: |
          curl -sL https://github.com/sqlc-dev/sqlc/releases/download/v1.30.0/sqlc_1.30.0_linux_amd64.tar.gz | tar xz -C /usr/local/bin sqlc
          sqlc generate
          for f in internal/db/db.go internal/db/models.go internal/db/*.sql.go; do
            if [ -f "$f" ] && ! head -1 "$f" | grep -q '^//go:build'; then
              printf '//go:build !lite\n\n' | cat - "$f" > "$f.tmp" && mv "$f.tmp" "$f"
            fi
          done

      - name: Install templ and generate
        run: |
          go install github.com/a-h/templ/cmd/templ@latest
          templ generate
          find internal/templates/components -name '*_templ.go' -print0 | while IFS= read -r -d '' f; do
            if ! head -1 "$f" | grep -q '^//go:build'; then
              printf '//go:build !headless && !lite\n\n' | cat - "$f" > "$f.tmp" && mv "$f.tmp" "$f"
            fi
          done

      - name: Build CSS
        # The static package (internal/mcp/server.go imports it for the
        # favicon) still needs static/css/styles.css to exist for the
        # `//go:embed all:css` directive to resolve. Headless builds don't
        # serve the CSS at runtime — but the file has to be present to
        # compile.
        run: make css

      - name: go build -tags=headless
        run: go build -tags=headless ./...

      - name: go vet -tags=headless
        run: go vet -tags=headless ./...

      - name: go test -tags=headless
        run: go test -tags=headless ./...

  test-lite:
    name: Test (lite, CLI-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      # No sqlc/templ generation needed: -tags=lite excludes internal/db and
      # internal/templates entirely, so the generated artifacts wouldn't even
      # be part of the build graph. We still create empty stubs for the
      # *_templ.go references so v1 doesn't drift if the build picks them up
      # via some untagged-pkg edge case (it currently doesn't).

      - name: go build -tags=lite
        run: go build -tags=lite ./...

      - name: go vet -tags=lite
        run: go vet -tags=lite ./...

      - name: go test -tags=lite
        run: go test -tags=lite ./...

      - name: go build -tags=lite -o breadbox-cli ./cmd/breadbox
        run: |
          go build -tags=lite -o breadbox-cli ./cmd/breadbox
          ls -lh breadbox-cli
          ./breadbox-cli --help | head -20

  build:
    name: Build & Push
    needs: [test, test-headless, test-lite]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/canalesb93/breadbox
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}

      - name: Determine VERSION build arg
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Release Binaries
    needs: [test, test-headless, test-lite]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install sqlc and generate
        run: |
          curl -sL https://github.com/sqlc-dev/sqlc/releases/download/v1.30.0/sqlc_1.30.0_linux_amd64.tar.gz | tar xz -C /usr/local/bin sqlc
          sqlc generate

      - name: Install templ and generate
        run: |
          go install github.com/a-h/templ/cmd/templ@latest
          templ generate

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build v2 SPA
        run: |
          cd web
          bun install --frozen-lockfile
          bun run build

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${{ github.ref_name }}
          go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o breadbox-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/breadbox

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: breadbox-${{ matrix.goos }}-${{ matrix.goarch }}
          path: breadbox-${{ matrix.goos }}-${{ matrix.goarch }}

  publish-release:
    name: Publish Release
    needs: [release, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum breadbox-* > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/breadbox-*
            artifacts/SHA256SUMS

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment: breadbox-dev
    if: github.repository == 'canalesb93/breadbox' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 5
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # Prune unused images after the new one is live — without this,
          # every deploy leaves the old image behind and the dev box's disk
          # eventually fills to 100% (wedged the box once; see incident).
          script: cd ${{ secrets.DEPLOY_PATH }} && docker compose pull && docker compose up -d && docker image prune -af

      - name: Verify health
        run: |
          sleep 5
          for i in 1 2 3 4 5; do
            if curl -sf "https://${{ secrets.DEPLOY_HOST }}/health/ready"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
