root = "."
tmp_dir = "tmp"

[build]
  # Only Go and templ changes trigger a rebuild. HTML/CSS are served from disk
  # at runtime (BREADBOX_DEV_RELOAD=1), so watching them here would cause
  # spurious restarts. *.templ files run through `templ generate` first to
  # produce *_templ.go (committed-out via .gitignore); the pre_cmd regenerates
  # them so edits to a component show up on the next Go rebuild.
  pre_cmd = ["templ generate"]
  cmd = "go build -o ./tmp/breadbox ./cmd/breadbox"
  bin = "./tmp/breadbox"
  full_bin = "./tmp/breadbox serve"
  include_ext = ["go", "templ"]
  exclude_dir = ["tmp", "static", "internal/templates/layout", "internal/templates/pages", "internal/templates/partials", "internal/db/migrations", "docs", "node_modules", ".git", ".claude"]
  # Skip *_test.go, *.sql.go, *_templ.go — air still watches *.templ so air
  # regenerates the Go file before rebuilding; watching the derivative as well
  # would double-fire.
  exclude_regex = ["_test\\.go$", "\\.sql\\.go$", "_templ\\.go$"]
  delay = 300
  stop_on_error = true
  send_interrupt = true
  kill_delay = "2s"

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
