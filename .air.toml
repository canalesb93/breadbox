root = "."
tmp_dir = "tmp"

[build]
  # Go changes trigger a rebuild. .templ changes also trigger a rebuild after
  # `templ generate` runs via pre_cmd so the regenerated Go code is compiled in.
  # HTML/CSS are served from disk at runtime (BREADBOX_DEV_RELOAD=1), so we
  # keep `internal/templates` excluded except for the templ components dir,
  # which holds Go + .templ sources that must be compiled.
  pre_cmd = ["templ generate"]
  cmd = "go build -o ./tmp/breadbox ./cmd/breadbox"
  bin = "./tmp/breadbox"
  full_bin = "./tmp/breadbox serve"
  include_ext = ["go", "templ"]
  # Excluding `internal/templates` keeps html/template edits from restarting
  # the server (BREADBOX_DEV_RELOAD=1 reloads them at request time). The
  # `components` subdir is watched via `include_dir` below.
  exclude_dir = ["tmp", "static", "internal/templates", "internal/db/migrations", "docs", "node_modules", ".git", ".claude"]
  include_dir = ["internal/templates/components"]
  # Skip generated Go so regenerated `_templ.go` writes don't kick off a
  # second restart — the .templ edit that produced them already triggered one.
  exclude_regex = ["_test\\.go$", "\\.sql\\.go$", "_templ\\.go$"]
  delay = 300
  stop_on_error = true
  send_interrupt = true
  kill_delay = "2s"

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
